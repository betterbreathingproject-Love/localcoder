<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Zoom Video Editor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #111118; --bg2: #1a1a2e; --bg3: #22223a; --bgc: #1e1e32;
  --bdr: rgba(255,255,255,.08); --txt: #e2e8f0; --txt2: #8892a4;
  --txt3: #5a6478; --acc: #4a9eff; --accg: rgba(74,158,255,.12);
  --grn: #48bb78; --pur: #7c5cd0; --red: #f56565; --org: #ed8936;
  --r: 14px; --rs: 10px; --rx: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--txt); min-height: 100vh;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
  padding: 0 0 env(safe-area-inset-bottom, 0);
}
a { color: var(--acc); text-decoration: none; }

/* ── Header ─────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg2) 0%, rgba(26,26,46,.95) 100%);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bdr); padding: 16px 16px 12px;
}
.header-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.header-logo {
  width:36px; height:36px; border-radius:10px;
  background: linear-gradient(135deg, var(--pur), var(--acc));
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.header-title { font-size:17px; font-weight:700; flex:1; }
.header-subtitle { font-size:12px; color:var(--txt2); margin-top:1px; }
.header-status {
  font-size:10px; padding:3px 8px; border-radius:20px; font-weight:600;
  background: rgba(72,187,120,.12); color: var(--grn); border:1px solid rgba(72,187,120,.2);
}

/* ── Tabs ────────────────────────────────────────────── */
.tabs { display:flex; gap:3px; }
.tab {
  flex:1; padding:7px 0; text-align:center; font-size:11px; font-weight:600;
  color:var(--txt3); background:transparent; border:none; border-radius:var(--rx);
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.tab.active { background:var(--bg3); color:var(--txt); }
.tab:active { transform:scale(.97); }

/* ── Content ─────────────────────────────────────────── */
.content { padding:12px 16px 24px; }
.empty-state { text-align:center; padding:40px 24px; color:var(--txt3); }
.empty-icon { font-size:40px; margin-bottom:10px; opacity:.6; }
.empty-title { font-size:15px; font-weight:600; color:var(--txt2); margin-bottom:6px; }
.empty-desc { font-size:13px; line-height:1.5; }
</style>
<style>
/* ── Create Tab ──────────────────────────────────────── */
.create-section { margin-bottom:16px; }
.create-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--txt3); margin-bottom:8px;
}
.prompt-input {
  width:100%; min-height:80px; padding:12px; border-radius:var(--rs);
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt);
  font-size:14px; font-family:inherit; resize:vertical; outline:none;
  transition:border-color .2s;
}
.prompt-input:focus { border-color:var(--acc); }
.prompt-input::placeholder { color:var(--txt3); }

.option-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.option-chip {
  padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600;
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt2);
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.option-chip.active { background:var(--accg); border-color:var(--acc); color:var(--acc); }
.option-chip:active { transform:scale(.95); }

.btn-primary {
  width:100%; padding:14px; border:none; border-radius:var(--rs);
  background:linear-gradient(135deg, var(--pur), var(--acc));
  color:#fff; font-size:15px; font-weight:700; cursor:pointer;
  transition:all .2s; margin-top:8px;
}
.btn-primary:active { transform:scale(.98); opacity:.9; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }

.btn-secondary {
  width:100%; padding:10px; border:1px solid var(--bdr); border-radius:var(--rs);
  background:var(--bgc); color:var(--txt2); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .2s; margin-top:8px;
}
.btn-secondary:active { transform:scale(.98); }

/* ── Chat Tab ────────────────────────────────────────── */
.chat-container { display:flex; flex-direction:column; height:calc(100vh - 185px); }
.chat-messages {
  flex:1; overflow-y:auto; padding-bottom:12px;
  -webkit-overflow-scrolling:touch;
}
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }

.msg { margin-bottom:10px; display:flex; }
.msg.user { justify-content:flex-end; }
.msg.assistant { justify-content:flex-start; }
.msg-bubble {
  max-width:85%; padding:10px 14px; border-radius:16px;
  font-size:13px; line-height:1.5; word-break:break-word;
}
.msg.user .msg-bubble {
  background:linear-gradient(135deg, var(--pur), var(--acc));
  color:#fff; border-bottom-right-radius:4px;
}
.msg.assistant .msg-bubble {
  background:var(--bgc); border:1px solid var(--bdr);
  color:var(--txt); border-bottom-left-radius:4px;
  max-width:95%;
}

.chat-input-row {
  display:flex; gap:8px; padding-top:10px;
  border-top:1px solid var(--bdr);
}
.chat-input {
  flex:1; padding:10px 14px; border-radius:20px;
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt);
  font-size:14px; font-family:inherit; outline:none;
}
.chat-input:focus { border-color:var(--acc); }
.chat-input::placeholder { color:var(--txt3); }
.chat-send {
  width:40px; height:40px; border-radius:50%; border:none;
  background:linear-gradient(135deg, var(--pur), var(--acc));
  color:#fff; font-size:16px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.chat-send:disabled { opacity:.4; cursor:not-allowed; }

/* ── Scene cards in chat ─────────────────────────────── */
.scene-inline { margin-top:8px; }
.scene-card-mini {
  background:var(--bg3); border:1px solid var(--bdr); border-radius:var(--rx);
  padding:8px 10px; margin-bottom:6px;
}
.scene-card-mini-title { font-size:12px; font-weight:700; color:var(--acc); }
.scene-card-mini-mood { font-size:10px; color:var(--txt3); margin-left:6px; }
.scene-card-mini-prompt { font-size:11px; color:var(--txt2); margin-top:3px; line-height:1.4; }
.scene-card-mini-shots { font-size:10px; color:var(--txt3); margin-top:4px; }

/* ── Shot list inside chat scene cards ───────────────── */
.scene-shots-list { margin-top:8px; display:flex; flex-direction:column; gap:6px; }
.scene-shot-item {
  background:rgba(0,0,0,.2); border-radius:4px; padding:6px 8px;
  border-left:2px solid var(--pur);
}
.scene-shot-header {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:2px;
}
.scene-shot-num {
  font-size:10px; font-weight:700; color:var(--acc);
}
.scene-shot-type {
  font-size:10px; color:var(--txt2); background:rgba(255,255,255,.06);
  padding:1px 5px; border-radius:3px;
}
.scene-shot-cam { font-size:9px; color:var(--txt3); }
.scene-shot-dur { font-size:9px; color:var(--org); }
.scene-shot-trans { font-size:9px; color:var(--pur); }
.scene-shot-prompt {
  font-size:11px; color:var(--txt2); line-height:1.4; margin-top:2px;
}
.shot-prompt-line {
  font-size:10px; color:var(--txt2); line-height:1.3; margin-top:2px;
  overflow:hidden; text-overflow:ellipsis;
}
.shot-video-prompt { color:#6a9; border-left:2px solid #6a9; padding-left:4px; }
.shot-dialogue { color:#a96; font-style:italic; }

/* ── Characters Tab ──────────────────────────────────── */
.char-form { margin-bottom:16px; }
.char-input {
  width:100%; padding:10px 12px; border-radius:var(--rx);
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt);
  font-size:13px; font-family:inherit; outline:none; margin-bottom:8px;
}
.char-input:focus { border-color:var(--acc); }
.char-input::placeholder { color:var(--txt3); }

.char-list { display:flex; flex-direction:column; gap:10px; }
.char-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--bgc); border:1px solid var(--bdr); border-radius:var(--rs);
}
.char-avatar {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--bdr); overflow:hidden; background:var(--bg3);
  display:flex; align-items:center; justify-content:center;
}
.char-avatar img { width:100%; height:100%; object-fit:cover; }
.char-avatar-empty { font-size:20px; color:var(--txt3); }
.char-info { flex:1; min-width:0; }
.char-name { font-size:13px; font-weight:700; }
.char-role-tag {
  font-size:10px; color:var(--pur); background:rgba(124,92,208,.12);
  padding:1px 6px; border-radius:8px; margin-left:6px;
}
.char-desc { font-size:11px; color:var(--txt2); margin-top:2px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.char-enriched { font-size:9px; color:var(--grn); }

/* ── Project Cards ───────────────────────────────────── */
.projects { display:flex; flex-direction:column; gap:12px; }
.project-card {
  background:var(--bgc); border:1px solid var(--bdr); border-radius:var(--r);
  overflow:hidden; cursor:pointer; transition:all .2s;
}
.project-card:active { transform:scale(.98); opacity:.9; }
.project-thumb {
  width:100%; aspect-ratio:16/9; object-fit:cover; background:var(--bg3);
  display:flex; align-items:center; justify-content:center;
}
.project-thumb img { width:100%; height:100%; object-fit:cover; }
.project-thumb-empty { color:var(--txt3); font-size:32px; }
.project-info { padding:12px; }
.project-prompt {
  font-size:14px; font-weight:600; line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden; margin-bottom:6px;
}
.project-meta { display:flex; gap:12px; font-size:11px; color:var(--txt2); flex-wrap:wrap; }
.project-meta-item { display:flex; align-items:center; gap:3px; }

/* ── Detail view ─────────────────────────────────────── */
.detail-back {
  display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600;
  color:var(--acc); background:none; border:none; cursor:pointer; padding:0 0 12px;
}
.detail-prompt { font-size:16px; font-weight:700; line-height:1.4; margin-bottom:4px; }
.detail-meta { font-size:12px; color:var(--txt2); margin-bottom:16px; }
.section-title {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--txt3); margin:16px 0 8px; padding-left:2px;
}
.scenes { display:flex; flex-direction:column; gap:10px; }
.scene-card {
  background:var(--bgc); border:1px solid var(--bdr); border-radius:var(--rs); overflow:hidden;
}
.scene-header {
  display:flex; align-items:center; gap:8px; padding:10px 12px;
  border-bottom:1px solid var(--bdr); cursor:pointer;
}
.scene-num {
  width:24px; height:24px; border-radius:50%; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--pur),var(--acc)); color:#fff; flex-shrink:0;
}
.scene-title { font-size:13px; font-weight:600; flex:1; }
.scene-mood { font-size:10px; color:var(--txt3); }
.scene-chevron { color:var(--txt3); font-size:12px; transition:transform .2s; }
.scene-chevron.open { transform:rotate(90deg); }
.scene-body { padding:10px 12px; }
.scene-desc { font-size:12px; color:var(--txt2); line-height:1.5; margin-bottom:10px; }
.scene-prompt-label { font-size:10px; color:var(--txt3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.scene-prompt-text { font-size:11px; color:var(--acc); line-height:1.4; margin-bottom:10px; font-style:italic; }
.shots-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; }
.shot-card {
  border-radius:var(--rx); overflow:hidden; border:1px solid var(--bdr);
  background:var(--bg3); cursor:pointer; transition:all .2s;
}
.shot-card:active { transform:scale(.95); }
.shot-img { width:100%; aspect-ratio:1; object-fit:cover; background:var(--bg); }
.shot-img-empty {
  width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  color:var(--txt3); font-size:20px; background:var(--bg);
}
.shot-label { padding:4px 6px; font-size:9px; color:var(--txt2); text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Detail characters ───────────────────────────────── */
.chars-row { display:flex; gap:10px; overflow-x:auto; padding:4px 0 8px; -webkit-overflow-scrolling:touch; }
.chars-row::-webkit-scrollbar { display:none; }
.char-card-sm { flex-shrink:0; width:72px; text-align:center; }
.char-card-sm .char-avatar { width:56px; height:56px; margin:0 auto 4px; }
.char-card-sm .char-name { font-size:10px; }

/* ── Staged Videos ───────────────────────────────────── */
.staged-list { display:flex; flex-direction:column; gap:8px; }
.staged-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--bgc); border:1px solid var(--bdr); border-radius:var(--rs);
}
.staged-icon { font-size:20px; flex-shrink:0; }
.staged-info { flex:1; min-width:0; }
.staged-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.staged-detail { font-size:11px; color:var(--txt2); }
.staged-badge {
  font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px;
  text-transform:uppercase; letter-spacing:.5px;
}
.staged-badge.primary { background:rgba(74,158,255,.12); color:var(--acc); }
.staged-badge.broll { background:rgba(237,137,54,.12); color:var(--org); }

/* ── Lightbox ────────────────────────────────────────── */
.lightbox {
  position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.92);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.lightbox.open { opacity:1; pointer-events:auto; }
.lightbox img, .lightbox video { max-width:95vw; max-height:85vh; border-radius:var(--rs); object-fit:contain; }
.lightbox-close {
  position:absolute; top:16px; right:16px; width:36px; height:36px;
  border-radius:50%; background:rgba(255,255,255,.15); border:none;
  color:#fff; font-size:18px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
}

/* ── Project Bar ──────────────────────────────────────── */
.project-bar {
  display:flex; align-items:center; gap:8px;
  padding:8px 16px; background:rgba(124,92,208,.08);
  border-bottom:1px solid rgba(124,92,208,.18);
}
.project-bar-icon {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:linear-gradient(135deg, var(--pur), var(--acc));
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
}
.project-bar-info { flex:1; min-width:0; }
.project-bar-name {
  font-size:12px; font-weight:700; color:var(--txt);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.project-bar-meta {
  font-size:10px; color:var(--txt2); display:flex; gap:8px; margin-top:1px;
}
.project-bar-meta span { white-space:nowrap; }
.project-bar-new {
  padding:4px 10px; border-radius:14px; border:1px solid rgba(124,92,208,.3);
  background:transparent; color:var(--pur); font-size:10px; font-weight:700;
  cursor:pointer; white-space:nowrap; transition:all .2s;
}
.project-bar-new:active { transform:scale(.95); background:rgba(124,92,208,.12); }

/* ── Loading / Spinner ───────────────────────────────── */
.spinner {
  width:32px; height:32px; border:3px solid var(--bg3);
  border-top-color:var(--acc); border-radius:50%;
  animation:spin .8s linear infinite; margin:24px auto;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { text-align:center; font-size:13px; color:var(--txt2); }
.typing-dots { display:inline-flex; gap:3px; padding:4px 0; }
.typing-dots span {
  width:6px; height:6px; border-radius:50%; background:var(--txt3);
  animation:blink 1.4s infinite both;
}
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

/* ── Style picker grid ───────────────────────────────── */
.style-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
.style-card {
  padding:8px 10px; border-radius:var(--rx); background:var(--bgc);
  border:1px solid var(--bdr); cursor:pointer; transition:all .2s; text-align:center;
}
.style-card.active { border-color:var(--acc); background:var(--accg); }
.style-card:active { transform:scale(.97); }
.style-card-icon { font-size:18px; }
.style-card-name { font-size:10px; font-weight:600; color:var(--txt2); margin-top:2px; }

/* ── Info banner ─────────────────────────────────────── */
.info-banner {
  padding:10px 12px; border-radius:var(--rx); margin-bottom:12px;
  font-size:12px; line-height:1.5;
}
.info-banner.success { background:rgba(72,187,120,.1); color:var(--grn); border:1px solid rgba(72,187,120,.2); }
.info-banner.error { background:rgba(245,101,101,.1); color:var(--red); border:1px solid rgba(245,101,101,.2); }
.info-banner.info { background:var(--accg); color:var(--acc); border:1px solid rgba(74,158,255,.2); }

/* ── Video Tab ───────────────────────────────────────── */
.video-subtabs { display:flex; gap:3px; margin-bottom:12px; }
.video-subtab {
  flex:1; padding:6px 0; text-align:center; font-size:11px; font-weight:600;
  color:var(--txt3); background:var(--bgc); border:1px solid var(--bdr);
  border-radius:var(--rx); cursor:pointer; transition:all .2s;
}
.video-subtab.active { background:rgba(72,187,120,.12); border-color:var(--grn); color:var(--grn); }
.video-gen-section { margin-bottom:14px; }
.video-gen-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--txt3); margin-bottom:6px;
}
.video-ref-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(72px,1fr)); gap:6px;
  max-height:180px; overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.video-ref-item {
  position:relative; border-radius:var(--rx); overflow:hidden;
  border:2px solid transparent; cursor:pointer; transition:all .2s; aspect-ratio:1; background:var(--bg3);
}
.video-ref-item.selected { border-color:var(--grn); }
.video-ref-item img { width:100%; height:100%; object-fit:cover; display:block; }
.video-ref-check {
  position:absolute; top:3px; right:3px; width:16px; height:16px;
  border-radius:50%; background:var(--grn); display:flex;
  align-items:center; justify-content:center; font-size:9px; color:#fff;
  opacity:0; transition:opacity .15s;
}
.video-ref-item.selected .video-ref-check { opacity:1; }
.video-ref-none {
  padding:6px 10px; border-radius:var(--rx); font-size:11px;
  color:var(--txt3); background:var(--bgc); border:1px dashed var(--bdr);
  cursor:pointer; text-align:center; transition:all .2s;
}
.video-ref-none.selected { border-color:var(--grn); color:var(--grn); background:rgba(72,187,120,.08); }
.video-dims-row { display:flex; gap:6px; flex-wrap:wrap; }
.video-dim-chip {
  padding:5px 10px; border-radius:14px; font-size:11px; font-weight:600;
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt2);
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.video-dim-chip.active { background:rgba(72,187,120,.12); border-color:var(--grn); color:var(--grn); }
.video-frames-row { display:flex; align-items:center; gap:8px; }
.video-frames-slider { flex:1; accent-color:var(--grn); }
.video-frames-value { font-size:12px; font-weight:700; color:var(--grn); min-width:48px; text-align:right; }
.video-progress {
  padding:10px 12px; border-radius:var(--rx); margin-bottom:10px;
  background:var(--bgc); border:1px solid var(--bdr);
}
.video-progress-msg { font-size:12px; color:var(--txt2); margin-bottom:6px; }
.video-progress-bar { height:4px; border-radius:2px; background:var(--bg3); overflow:hidden; }
.video-progress-fill {
  height:100%; border-radius:2px; transition:width .4s;
  background:linear-gradient(90deg, var(--grn), var(--acc));
}
.video-asset-list { display:flex; flex-direction:column; gap:10px; }
.video-asset {
  background:var(--bgc); border:1px solid var(--bdr); border-radius:var(--rs); overflow:hidden;
}
.video-asset-thumb {
  width:100%; aspect-ratio:16/9; background:var(--bg3);

.video-asset-thumb video { width:100%; height:100%; object-fit:cover; }

}
.video-play-icon {

}
.video-asset-info { padding:8px 12px; }
.video-asset-prompt {
  font-size:12px; font-weight:600; line-height:1.4;

}
.video-asset-meta { font-size:10px; color:var(--txt2); display:flex; gap:10px; flex-wrap:wrap; }

/* ── Music Tab ───────────────────────────────────────── */
.music-subtabs { display:flex; gap:3px; margin-bottom:12px; }
.music-subtab {
  flex:1; padding:6px 0; text-align:center; font-size:11px; font-weight:600;
  color:var(--txt3); background:var(--bgc); border:1px solid var(--bdr);
  border-radius:var(--rx); cursor:pointer; transition:all .2s;
}
.music-subtab.active { background:var(--accg); border-color:var(--acc); color:var(--acc); }

.music-gen-section { margin-bottom:14px; }
.music-gen-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--txt3); margin-bottom:6px;
}
.music-dur-row { display:flex; align-items:center; gap:8px; }
.music-dur-slider { flex:1; accent-color:var(--acc); }
.music-dur-value { font-size:12px; font-weight:700; color:var(--acc); min-width:36px; text-align:right; }

.music-tags-input {
  width:100%; padding:8px 12px; border-radius:var(--rx);
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt);
  font-size:12px; font-family:inherit; outline:none; margin-top:6px;
}
.music-tags-input:focus { border-color:var(--acc); }
.music-tags-input::placeholder { color:var(--txt3); }

.music-lyrics-input {
  width:100%; min-height:80px; padding:8px 12px; border-radius:var(--rx);
  background:var(--bgc); border:1px solid var(--bdr); color:var(--txt);
  font-size:12px; font-family:inherit; outline:none; resize:vertical; margin-top:6px;
}
.music-lyrics-input:focus { border-color:var(--acc); }
.music-lyrics-input::placeholder { color:var(--txt3); }

.music-progress {
  padding:10px 12px; border-radius:var(--rx); margin-bottom:10px;
  background:var(--bgc); border:1px solid var(--bdr);
}
.music-progress-msg { font-size:12px; color:var(--txt2); margin-bottom:6px; }
.music-progress-bar {
  height:4px; border-radius:2px; background:var(--bg3); overflow:hidden;
}
.music-progress-fill {
  height:100%; border-radius:2px; transition:width .3s;

.music-asset-list { display:flex; flex-direction:column; gap:8px; }
.music-asset {
  display:flex; align-items:center; gap:10px; padding:10px 12px;

}
.music-asset-play {
  width:36px; height:36px; border-radius:50%; border:none; flex-shrink:0;
  background:linear-gradient(135deg, var(--pur), var(--acc));

}
.music-asset-play:active { transform:scale(.9); }
.music-asset-info { flex:1; min-width:0; }
.music-asset-prompt {
  font-size:12px; font-weight:600; white-space:nowrap;

}
.music-asset-meta { font-size:10px; color:var(--txt2); margin-top:2px; }

.music-scrub-thumb {

/* ── Prompt Lab chat (music) ─────────────────────────── */
.plab-container { display:flex; flex-direction:column; height:calc(100vh - 200px); }
.plab-messages {
  flex:1; overflow-y:auto; padding-bottom:12px;
  -webkit-overflow-scrolling:touch;
}
.plab-messages::-webkit-scrollbar { width:4px; }

.plab-apply-btn {
  display:inline-block; margin-top:6px; padding:4px 10px; border-radius:12px;
  background:linear-gradient(135deg, var(--pur), var(--acc));
  color:#fff; font-size:10px; font-weight:700; border:none; cursor:pointer;
}
.plab-apply-btn:active { transform:scale(.95); }
.plab-prompt-block {
  margin-top:8px; padding:8px 10px; border-radius:var(--rx);
  background:rgba(124,92,208,.08); border:1px solid rgba(124,92,208,.2);
  font-size:11px; color:var(--txt2); white-space:pre-wrap; line-height:1.5;

/* ── Monitor Tab ─────────────────────────────────────── */
.monitor-status-bar {
  display:flex; align-items:center; gap:8px; padding:8px 12px;

}
.monitor-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.monitor-dot.connected { background:var(--grn); box-shadow:0 0 6px rgba(72,187,120,.5); }
.monitor-dot.disconnected { background:var(--red); }
.monitor-dot.running { background:var(--grn); animation:pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.monitor-status-text { font-size:12px; color:var(--txt2); flex:1; }
.monitor-status-badge {
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px;
  text-transform:uppercase; letter-spacing:.5px;
}
.monitor-status-badge.idle { background:rgba(255,255,255,.06); color:var(--txt3); }
.monitor-status-badge.running { background:rgba(72,187,120,.12); color:var(--grn); }
.monitor-status-badge.completed { background:rgba(74,158,255,.12); color:var(--acc); }
.monitor-status-badge.failed { background:rgba(245,101,101,.12); color:var(--red); }

.monitor-media-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px;
  margin-bottom:16px;
}
.monitor-media-item {

  background:var(--bg3); cursor:pointer; transition:all .2s;
}

}
.monitor-media-time {

.monitor-feed { display:flex; flex-direction:column; gap:4px; }
.monitor-log-entry {

}
.monitor-log-entry.info { background:rgba(255,255,255,.03); border-left-color:var(--acc); color:var(--txt2); }
.monitor-log-entry.tool { background:rgba(124,92,208,.06); border-left-color:var(--pur); color:var(--txt2); }
.monitor-log-entry.result { background:rgba(72,187,120,.06); border-left-color:var(--grn); color:var(--txt2); }
.monitor-log-entry.error { background:rgba(245,101,101,.06); border-left-color:var(--red); color:var(--red); }

.monitor-actions {
  display:flex; gap:8px; margin-bottom:12px;
}
.monitor-action-btn {
  flex:1; padding:8px; border:1px solid var(--bdr); border-radius:var(--rx);
  background:var(--bgc); color:var(--txt2); font-size:11px; font-weight:600;
  cursor:pointer; transition:all .2s; text-align:center;

.monitor-inject-row {

}
.monitor-inject-input {
  flex:1; padding:8px 12px; border-radius:20px;

}
.monitor-inject-input:focus { border-color:var(--acc); }
.monitor-inject-input::placeholder { color:var(--txt3); }
.monitor-inject-send {
  width:36px; height:36px; border-radius:50%; border:none;
  background:linear-gradient(135deg, var(--pur), var(--acc));
  color:#fff; font-size:14px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.monitor-inject-send:disabled { opacity:.4; cursor:not-allowed; }

.monitor-section-title {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--txt3); margin:12px 0 8px; padding-left:2px;
}

<body>
<div id="app"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-content"></div>
</div>

<script>
'use strict';

// ── Telegram Web App SDK ──────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
  if (tg.themeParams?.bg_color) {
    document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
  }
}

// ── State ─────────────────────────────────────────────────
const S = {
  tab: 'create',
  loading: true,
  projects: [],
  staged: [],
  styles: [],
  session: null,
  detail: null,
  openScenes: {},
  chatBusy: false,
  banner: null, // {type:'success'|'error'|'info', text:'...'}
  // Create tab state
  createPrompt: '',
  selectedStyle: '',
  selectedWorkflow: 'fast-start',
  selectedLength: 60,
  // Video tab state
  videoSubTab: 'generate', // 'generate' | 'library'
  videoStatus: null,
  videoLibrary: [],
  imageLibrary: [],
  videoPrompt: '',
  videoNegPrompt: '',
  videoSelectedImage: null, // file_path of selected reference image, or null
  videoDims: '768x512',
  videoFrames: 65,
  videoSteps: 30,
  videoGuidance: 3.5,
  videoGenerating: false,
  videoProgress: null,
  // LLM state (shared by chat, music prompt lab, video prompt lab)
  llmStatus: null,   // {running, endpoint, omlx_installed}
  llmStarting: false,
  // Music tab state
  musicSubTab: 'generate', // 'generate' | 'promptlab' | 'library'
  musicStatus: null,
  musicLibrary: [],
  musicPrompt: '',
  musicTags: '',
  musicLyrics: '',
  musicDuration: 60,
  musicInstrumental: true,
  musicGenerating: false,
  musicProgress: null,
  musicPlabHistory: [],
  musicPlabBusy: false,
  musicPlayingId: null,
  musicAudioEl: null,
  musicPlayPct: 0,
  musicRafId: null,
  // Monitor tab state
  monitorLogs: [],
  monitorMedia: [],
  monitorConnected: false,
  monitorJobState: 'idle',
  monitorJobId: null,
};

const API = window.location.origin;

// ── Helpers ───────────────────────────────────────────────
async function fetchJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function postJSON(path, body) {
  const r = await fetch(API + path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  return r.json();
}
function mediaUrl(fp) { return fp ? API+'/media/'+encodeURIComponent(fp) : ''; }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function relTime(ds) {
  const d=(Date.now()-new Date(ds).getTime())/1000;
  if(d<60)return 'just now'; if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';
  const dd=Math.floor(d/86400);
  if(dd===1)return 'Yesterday'; if(dd<7)return dd+'d ago';
  return new Date(ds).toLocaleDateString();
}
function fmtDur(ms) { const s=Math.round(ms/1000); return s<60?s+'s':Math.floor(s/60)+'m '+(s%60)+'s'; }

// ── Data loading ──────────────────────────────────────────
async function loadAll() {
  await Promise.all([
    fetchJSON('/api/projects').then(p=>S.projects=p).catch(()=>S.projects=[]),
    fetchJSON('/api/staged').then(v=>S.staged=v).catch(()=>S.staged=[]),
    fetchJSON('/api/styles').then(st=>S.styles=st).catch(()=>S.styles=[]),
    fetchJSON('/api/session').then(ss=>S.session=ss).catch(()=>S.session=null),
    fetchJSON('/api/llm/status').then(ls=>S.llmStatus=ls).catch(()=>S.llmStatus=null),
    fetchJSON('/api/video/status').then(vs=>S.videoStatus=vs).catch(()=>S.videoStatus=null),
    fetchJSON('/api/video/library').then(vl=>S.videoLibrary=vl).catch(()=>S.videoLibrary=[]),
    fetchJSON('/api/images').then(il=>S.imageLibrary=il).catch(()=>S.imageLibrary=[]),
    fetchJSON('/api/music/status').then(ms=>S.musicStatus=ms).catch(()=>S.musicStatus=null),
    fetchJSON('/api/music/library').then(ml=>S.musicLibrary=ml).catch(()=>S.musicLibrary=[]),
  ]);
}
async function loadProjectDetail(id) {
  S.loading=true; render();
  try { S.detail=await fetchJSON('/api/projects/'+encodeURIComponent(id)); S.openScenes={}; }
  catch { S.detail=null; }
  S.loading=false; render();
}

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(src,isVideo) {
  const lb=document.getElementById('lightbox'), ct=document.getElementById('lightbox-content');
  ct.innerHTML = isVideo
    ? '<video src="'+esc(src)+'" controls autoplay playsinline style="max-width:95vw;max-height:85vh;border-radius:10px"></video>'
    : '<img src="'+esc(src)+'" alt="Preview">';
  lb.classList.add('open');
  if(tg) tg.HapticFeedback?.impactOccurred('light');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-content').innerHTML='';
}

// ── Banner ────────────────────────────────────────────────
function showBanner(type,text,ms) {
  S.banner={type,text}; render();
  if(ms) setTimeout(()=>{S.banner=null;render();},ms);
}
</script>
<script>
// ── Render ────────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  app.innerHTML = renderHeader() + renderProjectBar() + '<div class="content">' +
    (S.banner ? '<div class="info-banner '+S.banner.type+'">'+esc(S.banner.text)+'</div>' : '') +
    renderContent() + '</div>';
  bindEvents();
}

function renderProjectBar() {
  const ss = S.session;
  if(!ss?.active || !ss.project_id) return '';
  const prompt = ss.prompt || ss.history?.find(m=>m.role==='user')?.content || 'Untitled project';
  const truncated = prompt.length > 50 ? prompt.slice(0,47)+'…' : prompt;
  const sceneCount = ss.scenes?.length || 0;
  const style = ss.style || '';
  const workflow = ss.workflow || '';
  const wfLabel = workflow==='full-auto'?'Full Auto':workflow==='production'?'Production':'Fast Start';
  return `<div class="project-bar">
    <div class="project-bar-icon">📐</div>
    <div class="project-bar-info">
      <div class="project-bar-name">${esc(truncated)}</div>
      <div class="project-bar-meta">
        <span>🎞 ${sceneCount} scene${sceneCount!==1?'s':''}</span>
        ${style?'<span>🎨 '+esc(style)+'</span>':''}
        <span>⚡ ${esc(wfLabel)}</span>
      </div>
    </div>
    <button class="project-bar-new" id="btn-new-project">+ New</button>
  </div>`;
}

function renderHeader() {
  const tabs = [
    {id:'create',icon:'✨',label:'Create'},
    {id:'chat',icon:'💬',label:'Chat'},
    {id:'monitor',icon:'📡',label:'Monitor'},
    {id:'characters',icon:'👤',label:'Cast'},
    {id:'video',icon:'🎬',label:'Video'},
    {id:'music',icon:'🎵',label:'Music'},
    {id:'projects',icon:'📁',label:'Projects'},
    {id:'staged',icon:'📥',label:'Staged'},
  ];
  return `<div class="header">
    <div class="header-top">
      <div class="header-logo">🎬</div>
      <div><div class="header-title">Zoom Video Editor</div>
        <div class="header-subtitle">Storyboard Studio</div></div>
      <div class="header-status">● Connected</div>
    </div>
    <div class="tabs">${tabs.map(t=>
      `<button class="tab ${S.tab===t.id?'active':''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`
    ).join('')}</div>
  </div>`;
}

function renderContent() {
  if(S.loading) return '<div class="spinner"></div><div class="loading-text">Loading...</div>';
  if(S.detail) return renderDetail();
  switch(S.tab) {
    case 'create': return renderCreate();
    case 'chat': return renderChat();
    case 'monitor': return renderMonitor();
    case 'characters': return renderCharacters();
    case 'video': return renderVideo();
    case 'music': return renderMusic();
    case 'projects': return renderProjects();
    case 'staged': return renderStaged();
    default: return '';
  }
}

// ── Create Tab ────────────────────────────────────────────
function renderCreate() {
  const lengths = [15,30,60,90,120];
  const workflows = [
    {id:'fast-start',label:'⚡ Fast Start',desc:'Quick generation'},
    {id:'full-auto',label:'🤖 Full Auto',desc:'AI handles everything'},
    {id:'production',label:'🎬 Production',desc:'Maximum quality'},
  ];
  return `
    <div class="create-section">
      <div class="create-label">What's your video about?</div>
      <textarea class="prompt-input" id="create-prompt" placeholder="Describe your video idea... e.g. 'A cinematic tour of Tokyo at night with neon lights and rain'">${esc(S.createPrompt)}</textarea>
    </div>
    <div class="create-section">
      <div class="create-label">Visual Style</div>
      <div class="style-grid">${S.styles.map(st=>
        `<div class="style-card ${S.selectedStyle===st.key?'active':''}" data-style="${esc(st.key)}">
          <div class="style-card-icon">${esc(st.label.split(' ')[0])}</div>
          <div class="style-card-name">${esc(st.label.split(' ').slice(1).join(' '))}</div>
        </div>`
      ).join('')}
        <div class="style-card ${S.selectedStyle===''?'active':''}" data-style="">
          <div class="style-card-icon">🎯</div>
          <div class="style-card-name">No Style</div>
        </div>
      </div>
    </div>
    <div class="create-section">
      <div class="create-label">Video Length</div>
      <div class="option-row">${lengths.map(l=>
        `<div class="option-chip ${S.selectedLength===l?'active':''}" data-length="${l}">${l}s</div>`
      ).join('')}</div>
    </div>
    <div class="create-section">
      <div class="create-label">Workflow</div>
      <div class="option-row">${workflows.map(w=>
        `<div class="option-chip ${S.selectedWorkflow===w.id?'active':''}" data-workflow="${w.id}">${w.label}</div>`
      ).join('')}</div>
    </div>
    <button class="btn-primary" id="btn-create" ${S.chatBusy?'disabled':''}>
      ${S.chatBusy?'Creating...':'✨ Create Storyboard'}
    </button>
    ${S.session?.active ? '<button class="btn-secondary" id="btn-continue">💬 Continue Current Session</button>' : ''}
  `;
}

// ── Chat Tab ──────────────────────────────────────────────
function renderChat() {
  const hist = S.session?.history || [];
  const scenes = S.session?.scenes || [];
  const llmRunning = S.llmStatus?.running;
  const canStartLlm = S.llmStatus?.omlx_installed;

  if(!hist.length && !S.chatBusy) {
    return `<div class="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">No conversation yet</div>
      <div class="empty-desc">Go to the Create tab to start a storyboard,<br>or type a message below to begin chatting.</div>
    </div>
    ${!llmRunning ? `<div class="info-banner ${canStartLlm?'info':'error'}" style="margin-bottom:8px">
      ${canStartLlm
        ? `🤖 Local AI not running — <button id="btn-start-llm" style="background:none;border:none;color:var(--acc);font-weight:700;cursor:pointer;padding:0;font-size:inherit" ${S.llmStarting?'disabled':''}>
            ${S.llmStarting?'Starting...':'tap to start'}
           </button>`
        : '⚠️ No local AI installed. Open the main app\'s Chat tab to set one up.'
      }
    </div>` : ''}
    <div class="chat-input-row" style="position:fixed;bottom:0;left:0;right:0;padding:10px 16px;background:var(--bg);border-top:1px solid var(--bdr);">
      <input class="chat-input" id="chat-input" placeholder="Describe your video idea..." autocomplete="off">
      <button class="chat-send" id="chat-send">➤</button>
    </div>`;
  }
  let msgs = '';
  for(const m of hist) {
    if(m.role==='user') {
      msgs += `<div class="msg user"><div class="msg-bubble">${esc(m.content)}</div></div>`;
    } else {
      const parsed = parseSceneBlocks(m.content);
      msgs += `<div class="msg assistant"><div class="msg-bubble">${formatAssistantMsg(m.content, parsed)}</div></div>`;
    }
  }
  if(S.chatBusy) {
    msgs += `<div class="msg assistant"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  }
  return `<div class="chat-container">
    <div class="chat-messages" id="chat-messages">${msgs}</div>
    ${scenes.length && !S.chatBusy ? '<button class="btn-primary" id="btn-chat-generate" style="margin:0 0 8px;flex-shrink:0">🎬 Generate Movie ('+scenes.length+' scene'+(scenes.length!==1?'s':'')+')</button>' : ''}
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Refine your storyboard..." autocomplete="off" ${S.chatBusy?'disabled':''}>
      <button class="chat-send" id="chat-send" ${S.chatBusy?'disabled':''}>➤</button>
    </div>
  </div>`;
}

function parseSceneBlocks(text) {
  const re = /```scene\s*\n([\s\S]*?)```/g;
  const scenes = [];
  let m;
  while((m=re.exec(text))!==null) {
    const block=m[1];
    const title = extractField(block,'TITLE')||'Scene';
    const prompt = extractField(block,'PROMPT')||'';
    const mood = extractField(block,'MOOD')||'';
    const duration = extractField(block,'DURATION')||'';
    // Parse individual shots
    const shots = [];
    const shotRe = /SHOT\s+(\d+):\s*(.+)/gi;
    let sm;
    while((sm=shotRe.exec(block))!==null) {
      const parts = sm[2].split('|').map(p=>p.trim());
      shots.push({
        num: sm[1],
        type: parts[0]||'',
        camera: parts[1]||'',
        dur: parts[2]||'',
        prompt: parts[3]||'',
        transition: parts[4]||'',
      });
    }
    scenes.push({title,prompt,mood,duration,shots});
  }
  return scenes;
}
function extractField(block,field) {
  for(const line of block.split('\n')) {
    const t=line.trim();
    if(t.toUpperCase().startsWith(field+':')) return t.slice(field.length+1).trim();
  }
  return null;
}
function formatAssistantMsg(text, scenes) {
  // Strip scene blocks from raw text first, then escape the rest
  const stripped = text.replace(/```scene[\s\S]*?```/g, '').replace(/\n{3,}/g,'\n\n').trim();
  let html = esc(stripped).replace(/\n/g,'<br>');
  // Append rich scene cards with full shot details
  if(scenes.length) {
    html += '<div class="scene-inline">';
    for(const sc of scenes) {
      html += `<div class="scene-card-mini">
        <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">
          <span class="scene-card-mini-title">${esc(sc.title)}</span>
          <span class="scene-card-mini-mood">${esc(sc.mood)}</span>
          ${sc.duration?'<span style="font-size:10px;color:var(--txt3)">⏱ '+esc(sc.duration)+'</span>':''}
        </div>
        ${sc.prompt?'<div class="scene-card-mini-prompt">'+esc(sc.prompt)+'</div>':''}`;
      // Render each shot fully
      if(sc.shots.length) {
        html += '<div class="scene-shots-list">';
        for(const sh of sc.shots) {
          html += `<div class="scene-shot-item">
            <div class="scene-shot-header">
              <span class="scene-shot-num">Shot ${esc(sh.num)}</span>
              <span class="scene-shot-type">${esc(sh.type)}</span>
              ${sh.camera?'<span class="scene-shot-cam">'+esc(sh.camera)+'</span>':''}
              ${sh.dur?'<span class="scene-shot-dur">'+esc(sh.dur)+'</span>':''}
              ${sh.transition&&sh.transition!=='cut'?'<span class="scene-shot-trans">→ '+esc(sh.transition)+'</span>':''}
            </div>
            ${sh.prompt?'<div class="scene-shot-prompt">🖼 '+esc(sh.prompt)+'</div>':''}
          </div>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}
</script>
<script>
// ── Monitor Tab ───────────────────────────────────────────
let _ws = null;
let _wsReconnectTimer = null;

function connectMonitorWS() {
  if (_ws && _ws.readyState <= 1) return; // already open or connecting
  const wsUrl = API.replace(/^http/, 'ws') + '/miniapp';
  _ws = new WebSocket(wsUrl);

  _ws.onopen = () => {
    S.monitorConnected = true;
    if (S.tab === 'monitor') render();
  };

  _ws.onclose = () => {
    S.monitorConnected = false;
    if (S.tab === 'monitor') render();
    // Auto-reconnect after 3s
    clearTimeout(_wsReconnectTimer);
    _wsReconnectTimer = setTimeout(connectMonitorWS, 3000);
  };

  _ws.onerror = () => {
    S.monitorConnected = false;
  };

  _ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleMonitorMessage(msg);
    } catch {}
  };
}

function handleMonitorMessage(msg) {
  if (!msg) return;

  if (msg.type === 'status') {
    S.monitorJobState = msg.state || 'idle';
    S.monitorJobId = msg.jobId || null;
    // Populate initial logs
    if (msg.logs && msg.logs.length && !S.monitorLogs.length) {
      for (const l of msg.logs) {
        if (l.type === 'media') {
          S.monitorMedia.push(l);
        } else {
          S.monitorLogs.push(l);
        }
      }
    }
  } else if (msg.type === 'media') {
    S.monitorMedia.push(msg);
    if (S.monitorMedia.length > 50) S.monitorMedia.shift();
  } else if (msg.type === 'screenshot') {
    if (msg.data) {
      const src = msg.data.startsWith('data:') ? msg.data : 'data:image/png;base64,' + msg.data;
      S.monitorMedia.push({ type: 'media', mediaType: 'image', src, time: Date.now() });
      if (S.monitorMedia.length > 50) S.monitorMedia.shift();
    }
  } else if (msg.type === 'log' || msg.type === 'tool_use') {
    S.monitorLogs.push(msg);
    if (S.monitorLogs.length > 100) S.monitorLogs.shift();
  } else if (msg.type === 'job_started') {
    S.monitorJobState = 'running';
    S.monitorJobId = msg.jobId;
    S.monitorLogs.push({ type: 'log', text: '▶ Job started' + (msg.prompt ? ': ' + msg.prompt : ''), logType: 'info', time: Date.now() });
  } else if (msg.type === 'job_completed') {
    S.monitorJobState = 'idle';
    S.monitorLogs.push({ type: 'log', text: '✅ Job completed', logType: 'result', time: Date.now() });
  } else if (msg.type === 'job_failed') {
    S.monitorJobState = 'idle';
    S.monitorLogs.push({ type: 'log', text: '❌ Job failed: ' + (msg.error || ''), logType: 'error', time: Date.now() });
  } else if (msg.type === 'input_request') {
    S.monitorLogs.push({ type: 'log', text: '❓ ' + (msg.question || 'Agent needs input'), logType: 'info', time: Date.now() });
  }

  if (S.tab === 'monitor') render();
}

function renderMonitor() {
  // Connect WS if not already
  connectMonitorWS();

  const stateClass = S.monitorJobState === 'running' ? 'running' : (S.monitorJobState === 'completed' ? 'completed' : (S.monitorJobState === 'failed' ? 'failed' : 'idle'));
  const dotClass = !S.monitorConnected ? 'disconnected' : (S.monitorJobState === 'running' ? 'running' : 'connected');

  let html = `<div class="monitor-status-bar">
    <div class="monitor-dot ${dotClass}"></div>
    <div class="monitor-status-text">${S.monitorConnected ? 'Connected' : 'Disconnected'}</div>
    <div class="monitor-status-badge ${stateClass}">${S.monitorJobState}</div>
  </div>`;

  // Action buttons
  html += `<div class="monitor-actions">
    <button class="monitor-action-btn" id="mon-screenshot">📸 Screenshot</button>
    <button class="monitor-action-btn" id="mon-refresh">🔄 Refresh</button>
    ${S.monitorJobState === 'running' ? '<button class="monitor-action-btn danger" id="mon-stop">⏹ Stop</button>' : ''}
  </div>`;

  // Inject prompt row
  html += `<div class="monitor-inject-row">
    <input class="monitor-inject-input" id="mon-inject-input" placeholder="Inject message to agent..." autocomplete="off">
    <button class="monitor-inject-send" id="mon-inject-send">➤</button>
  </div>`;

  // Media gallery (screenshots & videos)
  if (S.monitorMedia.length) {
    html += '<div class="monitor-section-title">📸 Screenshots & Media (' + S.monitorMedia.length + ')</div>';
    html += '<div class="monitor-media-grid">';
    // Show most recent first
    const mediaReversed = [...S.monitorMedia].reverse();
    for (const m of mediaReversed) {
      const timeStr = m.time ? new Date(m.time).toLocaleTimeString() : '';
      if (m.mediaType === 'video') {
        html += `<div class="monitor-media-item" data-lightbox-video="${esc(m.src)}">
          <video src="${esc(m.src)}" muted playsinline preload="metadata"></video>
          <div class="monitor-media-time">${esc(timeStr)}</div>
        </div>`;
      } else {
        html += `<div class="monitor-media-item" data-lightbox="${esc(m.src)}">
          <img src="${esc(m.src)}" alt="Screenshot" loading="lazy">
          <div class="monitor-media-time">${esc(timeStr)}</div>
        </div>`;
      }
    }
    html += '</div>';
  }

  // Log feed
  html += '<div class="monitor-section-title">📋 Activity Feed (' + S.monitorLogs.length + ')</div>';
  if (!S.monitorLogs.length && !S.monitorMedia.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">No activity yet</div>
      <div class="empty-desc">Run a job from the Create tab or send a command to the bot.<br>Screenshots and logs will appear here in real-time.</div>
    </div>`;
  } else {
    html += '<div class="monitor-feed">';
    const logsReversed = [...S.monitorLogs].reverse().slice(0, 50);
    for (const l of logsReversed) {
      const logType = l.logType || 'info';
      const timeStr = l.time ? new Date(l.time).toLocaleTimeString() : '';
      const text = l.text || l.summary || '';
      html += `<div class="monitor-log-entry ${logType}">
        <span class="monitor-log-time">${esc(timeStr)}</span>${esc(text)}
      </div>`;
    }
    html += '</div>';
  }

  return html;
}
