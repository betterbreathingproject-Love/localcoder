      <div class="empty-icon">🎵</div>
      <div class="empty-title">ACE-Step not installed</div>
      <div class="empty-desc">Install ACE-Step 1.5 from the main app's Music panel to generate full songs locally. No API key, no cloud.</div>
    </div>`;
  }
  const subtabs = [
    {id:'generate',label:'✨ Generate'},
    {id:'promptlab',label:'💬 Prompt Lab'},
    {id:'library',label:'📁 Library ('+S.musicLibrary.length+')'},
  ];
  let html = `<div class="music-subtabs">${subtabs.map(t=>
    `<button class="music-subtab ${S.musicSubTab===t.id?'active':''}" data-musictab="${t.id}">${t.label}</button>`
  ).join('')}</div>`;

  if(S.musicSubTab==='generate') html += renderMusicGenerate();
  else if(S.musicSubTab==='promptlab') html += renderMusicPromptLab();
  else html += renderMusicLibrary();
  return html;
}

function renderMusicGenerate() {
  const fmtD = s => s<60?s+'s':Math.floor(s/60)+'m '+(s%60)+'s';
  let html = `
    <div class="music-gen-section">
      <div class="music-gen-label">Describe your music</div>
      <textarea class="prompt-input" id="music-prompt" placeholder="e.g. 'Upbeat electronic dance track with heavy bass and synth pads' or 'Soft Bengali love song with acoustic guitar'">${esc(S.musicPrompt)}</textarea>
    </div>
    <div class="music-gen-section">
      <div class="music-gen-label">Genre / Style Tags</div>
      <input class="music-tags-input" id="music-tags" placeholder="lofi, piano, ambient, chill, 90s hip-hop" value="${esc(S.musicTags)}">
    </div>
    <div class="music-gen-section">
      <div class="music-gen-label">Duration</div>
      <div class="music-dur-row">
        <input type="range" class="music-dur-slider" id="music-dur" min="10" max="300" step="5" value="${S.musicDuration}">
        <span class="music-dur-value">${fmtD(S.musicDuration)}</span>
      </div>
    </div>
    <div class="music-gen-section">
      <div class="option-row">
        <div class="option-chip ${S.musicInstrumental?'active':''}" data-music-inst="true">🎹 Instrumental</div>
        <div class="option-chip ${!S.musicInstrumental?'active':''}" data-music-inst="false">🎤 With Vocals</div>
      </div>
    </div>`;
  if(!S.musicInstrumental) {
    html += `<div class="music-gen-section">
      <div class="music-gen-label">Lyrics (optional — AI writes them if empty)</div>
      <textarea class="music-lyrics-input" id="music-lyrics" placeholder="[Verse 1]\nYour lyrics here...\n\n[Chorus]\nChorus goes here...">${esc(S.musicLyrics)}</textarea>
    </div>`;
  }
  if(S.musicProgress) {
    html += `<div class="music-progress">
      <div class="music-progress-msg">${esc(S.musicProgress.message)}</div>
      <div class="music-progress-bar"><div class="music-progress-fill" style="width:${S.musicProgress.percent||0}%"></div></div>
    </div>`;
  }
  html += `<button class="btn-primary" id="btn-music-gen" ${S.musicGenerating?'disabled':''}>
    ${S.musicGenerating?'⏳ Generating...':'🎵 Generate Music'}
  </button>`;
  if(!S.musicStatus?.server_running) {
    html += `<div class="info-banner info" style="margin-top:10px">ACE-Step server not running. Start it from the main app's Music panel first.</div>`;
  }
  return html;
}

function renderMusicPromptLab() {
  // Check LLM availability — use the dedicated llmStatus which covers oMLX too
  const llmRunning = S.llmStatus?.running || S.musicStatus?.llm_available;
  if(!llmRunning) {
    const canStart = S.llmStatus?.omlx_installed || S.musicStatus?.omlx_installed;
    return `<div class="empty-state">
      <div class="empty-icon">🤖</div>
      <div class="empty-title">Local AI not running</div>
      <div class="empty-desc">${canStart
        ? 'Start your local AI to use the Prompt Lab — it will load automatically.'
        : 'Install oMLX or MLX-LM from the main app\'s Chat tab first.'
      }</div>
      ${canStart ? `<button class="btn-primary" id="btn-start-llm" style="margin-top:16px;max-width:220px;margin-left:auto;margin-right:auto" ${S.llmStarting?'disabled':''}>
        ${S.llmStarting?'<span class="typing-dots"><span></span><span></span><span></span></span> Starting...':'🚀 Start Local AI'}
      </button>` : ''}
    </div>`;
  }
  const hist = S.musicPlabHistory;
  let msgs = '';
  for(const m of hist) {
    if(m.role==='user') {
      msgs += `<div class="msg user"><div class="msg-bubble">${esc(m.content)}</div></div>`;
    } else {
      msgs += `<div class="msg assistant"><div class="msg-bubble">${formatPlabMsg(m.content)}</div></div>`;
    }
  }
  if(S.musicPlabBusy) {
    msgs += `<div class="msg assistant"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  }
  if(!hist.length && !S.musicPlabBusy) {
    msgs = `<div class="empty-state" style="padding:20px">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Music Prompt Lab</div>
      <div class="empty-desc">Describe your musical idea and the AI will help you craft the perfect ACE-Step prompt. Say something like "I want a chill lofi beat" or "epic orchestral trailer music".</div>
    </div>`;
  }
  return `<div class="plab-container">
    <div class="plab-messages" id="plab-messages">${msgs}</div>
    <div class="chat-input-row">
      <input class="chat-input" id="plab-input" placeholder="Describe your musical idea..." autocomplete="off" ${S.musicPlabBusy?'disabled':''}>
      <button class="chat-send" id="plab-send" ${S.musicPlabBusy?'disabled':''}>➤</button>
    </div>
  </div>`;
}

function formatPlabMsg(content) {
  // Check for ```prompt blocks and render them specially with an Apply button
  const promptMatch = content.match(/```prompt\n([\s\S]*?)```/);
  const stripped = content.replace(/```prompt\n[\s\S]*?```/g, '').trim();
  let html = esc(stripped).replace(/\n/g,'<br>');
  if(promptMatch) {
    html += `<div class="plab-prompt-block">${esc(promptMatch[1])}</div>`;
    html += `<button class="plab-apply-btn" data-plab-apply="${esc(btoa(promptMatch[1]))}">✨ Apply to Generator</button>`;
  }
  return html;
}

function renderMusicLibrary() {
  if(!S.musicLibrary.length) {
    return `<div class="empty-state">
      <div class="empty-icon">📁</div>
      <div class="empty-title">No music yet</div>
      <div class="empty-desc">Generate your first track from the Generate tab or use the Prompt Lab to craft the perfect prompt.</div>
    </div>`;
  }
  const fmtD = s => { const sec=Math.round(s); return sec<60?sec+'s':Math.floor(sec/60)+'m '+(sec%60)+'s'; };
  return '<div class="music-asset-list">'+S.musicLibrary.map(a=>{
    const isPlaying = S.musicPlayingId===a.id;
    return `<div class="music-asset">
      <button class="music-asset-play" data-music-play="${esc(a.id)}" data-music-file="${esc(a.file_path)}">${isPlaying?'⏸':'▶'}</button>
      <div class="music-asset-info">
        <div class="music-asset-prompt">${esc(a.prompt)}</div>
        <div class="music-asset-meta">${fmtD(a.duration_secs)} · ${a.tags?esc(a.tags.split(',').slice(0,3).join(', ')):''} · ${relTime(a.created_at)}</div>
      </div>
      <div class="music-asset-badge">${a.instrumental?'Inst':'Vocal'}</div>
      ${isPlaying?`<div class="music-scrub" data-music-scrub="${esc(a.id)}"><div class="music-scrub-fill" style="width:${S.musicPlayPct*100}%"></div><div class="music-scrub-thumb" style="left:${S.musicPlayPct*100}%"></div></div>`:''} 
    </div>`;
  }).join('')+'</div>';
}
</script>
<script>
// ── Event binding ─────────────────────────────────────────
function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',async ()=>{
      S.tab=t.dataset.tab; S.detail=null;
      // Refresh data when switching to projects or staged tabs
      if(t.dataset.tab==='projects') S.projects=await fetchJSON('/api/projects').catch(()=>S.projects);
      if(t.dataset.tab==='staged') S.staged=await fetchJSON('/api/staged').catch(()=>S.staged);
      if(t.dataset.tab==='video') {
        S.videoStatus=await fetchJSON('/api/video/status').catch(()=>S.videoStatus);
        S.videoLibrary=await fetchJSON('/api/video/library').catch(()=>S.videoLibrary);
        S.imageLibrary=await fetchJSON('/api/images').catch(()=>S.imageLibrary);
      }
      if(t.dataset.tab==='music') {
        S.musicStatus=await fetchJSON('/api/music/status').catch(()=>S.musicStatus);
        S.musicLibrary=await fetchJSON('/api/music/library').catch(()=>S.musicLibrary);
        S.llmStatus=await fetchJSON('/api/llm/status').catch(()=>S.llmStatus);
      }
      if(t.dataset.tab==='chat') {
        S.session=await fetchJSON('/api/session').catch(()=>S.session);
        S.llmStatus=await fetchJSON('/api/llm/status').catch(()=>S.llmStatus);
      }
      if(t.dataset.tab==='monitor') {
        // Fetch current status + logs via REST as initial state
        const status = await fetchJSON('/api/status').catch(()=>null);
        if(status) {
          S.monitorJobState = status.state || 'idle';
          S.monitorJobId = status.jobId || null;
          if(status.logs && status.logs.length) {
            S.monitorLogs = status.logs.filter(l=>l.type!=='media');
            S.monitorMedia = status.logs.filter(l=>l.type==='media');
          }
        }
        connectMonitorWS();
      }
      render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });

  // Create tab
  const promptEl=document.getElementById('create-prompt');
  if(promptEl) promptEl.addEventListener('input',e=>S.createPrompt=e.target.value);

  document.querySelectorAll('[data-style]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.selectedStyle=el.dataset.style; render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });
  document.querySelectorAll('[data-length]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.selectedLength=parseInt(el.dataset.length); render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });
  document.querySelectorAll('[data-workflow]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.selectedWorkflow=el.dataset.workflow; render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });

  // Create button
  const createBtn=document.getElementById('btn-create');
  if(createBtn) createBtn.addEventListener('click', handleCreate);

  // Continue session button
  const contBtn=document.getElementById('btn-continue');
  if(contBtn) contBtn.addEventListener('click',()=>{ S.tab='chat'; render(); });

  // Chat input
  const chatInput=document.getElementById('chat-input');
  const chatSend=document.getElementById('chat-send');
  if(chatInput) {
    chatInput.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handleChatSend(); }
    });
  }
  if(chatSend) chatSend.addEventListener('click', handleChatSend);

  // Scroll chat to bottom
  const chatMsgs=document.getElementById('chat-messages');
  if(chatMsgs) chatMsgs.scrollTop=chatMsgs.scrollHeight;

  // Character form
  const addCharBtn=document.getElementById('btn-add-char');
  if(addCharBtn) addCharBtn.addEventListener('click', handleAddCharacter);

  // Character role chips
  let selectedRole='';
  document.querySelectorAll('[data-role]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('[data-role]').forEach(c=>c.classList.remove('active'));
      el.classList.add('active');
      selectedRole=el.dataset.role;
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });
  window._selectedRole=()=>selectedRole;

  // Project cards
  document.querySelectorAll('.project-card').forEach(c=>{
    c.addEventListener('click',()=>{
      loadProjectDetail(c.dataset.project);
      if(tg) tg.HapticFeedback?.impactOccurred('light');
    });
  });

  // Back button
  const backBtn=document.getElementById('back-btn');
  if(backBtn) backBtn.addEventListener('click',()=>{ S.detail=null; render(); });

  // Scene expand/collapse
  document.querySelectorAll('.scene-header').forEach(h=>{
    h.addEventListener('click',()=>{
      S.openScenes[h.dataset.scene]=!S.openScenes[h.dataset.scene]; render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });

  // Generate button
  const genBtn=document.getElementById('btn-generate');
  if(genBtn) genBtn.addEventListener('click', handleGenerate);

  // Chat generate button
  const chatGenBtn=document.getElementById('btn-chat-generate');
  if(chatGenBtn) chatGenBtn.addEventListener('click', handleChatGenerate);

  // New project button (in project bar)
  const newProjBtn=document.getElementById('btn-new-project');
  if(newProjBtn) newProjBtn.addEventListener('click', handleNewProject);

  // Lightbox
  document.querySelectorAll('[data-lightbox]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); openLightbox(el.dataset.lightbox,false); });
  });
  document.querySelectorAll('[data-lightbox-video]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); openLightbox(el.dataset.lightboxVideo,true); });
  });

  // ── Monitor tab bindings ────────────────────────────────
  const monScreenshot = document.getElementById('mon-screenshot');
  if(monScreenshot) monScreenshot.addEventListener('click', () => {
    if(_ws && _ws.readyState === 1) _ws.send(JSON.stringify({type:'screenshot'}));
    else postJSON('/api/cmd', {type:'screenshot'}).catch(()=>{});
    if(tg) tg.HapticFeedback?.impactOccurred('light');
  });
  const monRefresh = document.getElementById('mon-refresh');
  if(monRefresh) monRefresh.addEventListener('click', async () => {
    const status = await fetchJSON('/api/status').catch(()=>null);
    if(status) {
      S.monitorJobState = status.state || 'idle';
      S.monitorJobId = status.jobId || null;
      if(status.logs && status.logs.length) {
        S.monitorLogs = status.logs.filter(l=>l.type!=='media');
        const newMedia = status.logs.filter(l=>l.type==='media');
        if(newMedia.length) S.monitorMedia = newMedia;
      }
    }
    render();
    if(tg) tg.HapticFeedback?.impactOccurred('light');
  });
  const monStop = document.getElementById('mon-stop');
  if(monStop) monStop.addEventListener('click', () => {
    if(_ws && _ws.readyState === 1) _ws.send(JSON.stringify({type:'stop'}));
    else postJSON('/api/cmd', {type:'stop'}).catch(()=>{});
    if(tg) tg.HapticFeedback?.notificationOccurred('warning');
  });
  const monInjectInput = document.getElementById('mon-inject-input');
  const monInjectSend = document.getElementById('mon-inject-send');
  if(monInjectInput) monInjectInput.addEventListener('keydown', e => {
    if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handleMonitorInject(); }
  });
  if(monInjectSend) monInjectSend.addEventListener('click', handleMonitorInject);

  // Start LLM button (appears in chat and prompt lab when no AI is running)
  const startLlmBtn = document.getElementById('btn-start-llm');
  if(startLlmBtn) startLlmBtn.addEventListener('click', handleStartLlm);

  // ── Video tab bindings ──────────────────────────────────
  document.querySelectorAll('[data-videotab]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.videoSubTab=el.dataset.videotab;
      if(S.videoSubTab==='library') fetchJSON('/api/video/library').then(vl=>S.videoLibrary=vl).catch(()=>{});
      render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });

  const videoPromptEl=document.getElementById('video-prompt');
  if(videoPromptEl) videoPromptEl.addEventListener('input',e=>S.videoPrompt=e.target.value);
  const videoNegEl=document.getElementById('video-neg-prompt');
  if(videoNegEl) videoNegEl.addEventListener('input',e=>S.videoNegPrompt=e.target.value);
  const videoFramesEl=document.getElementById('video-frames');
  if(videoFramesEl) videoFramesEl.addEventListener('input',e=>{ S.videoFrames=parseInt(e.target.value); render(); });

  document.querySelectorAll('[data-dims]').forEach(el=>{
    el.addEventListener('click',()=>{ S.videoDims=el.dataset.dims; render(); if(tg) tg.HapticFeedback?.selectionChanged(); });
  });

  // Image reference selection
  document.querySelectorAll('[data-ref]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.videoSelectedImage = S.videoSelectedImage===el.dataset.ref ? null : el.dataset.ref;
      render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });
  document.querySelectorAll('[data-ref-clear]').forEach(el=>{
    el.addEventListener('click',()=>{ S.videoSelectedImage=null; render(); });
  });

  const videoGenBtn=document.getElementById('btn-video-gen');
  if(videoGenBtn) videoGenBtn.addEventListener('click', handleVideoGenerate);

  // ── Music tab bindings ──────────────────────────────────
  document.querySelectorAll('[data-musictab]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.musicSubTab=el.dataset.musictab;
      if(S.musicSubTab==='library') fetchJSON('/api/music/library').then(ml=>S.musicLibrary=ml).catch(()=>{});
      render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });

  const musicPromptEl=document.getElementById('music-prompt');
  if(musicPromptEl) musicPromptEl.addEventListener('input',e=>S.musicPrompt=e.target.value);
  const musicTagsEl=document.getElementById('music-tags');
  if(musicTagsEl) musicTagsEl.addEventListener('input',e=>S.musicTags=e.target.value);
  const musicLyricsEl=document.getElementById('music-lyrics');
  if(musicLyricsEl) musicLyricsEl.addEventListener('input',e=>S.musicLyrics=e.target.value);
  const musicDurEl=document.getElementById('music-dur');
  if(musicDurEl) musicDurEl.addEventListener('input',e=>{ S.musicDuration=parseInt(e.target.value); render(); });

  document.querySelectorAll('[data-music-inst]').forEach(el=>{
    el.addEventListener('click',()=>{
      S.musicInstrumental=el.dataset.musicInst==='true'; render();
      if(tg) tg.HapticFeedback?.selectionChanged();
    });
  });

  const musicGenBtn=document.getElementById('btn-music-gen');
  if(musicGenBtn) musicGenBtn.addEventListener('click', handleMusicGenerate);

  // Prompt Lab input
  const plabInput=document.getElementById('plab-input');
  const plabSend=document.getElementById('plab-send');
  if(plabInput) plabInput.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handlePlabSend(); }
  });
  if(plabSend) plabSend.addEventListener('click', handlePlabSend);
  const plabMsgs=document.getElementById('plab-messages');
  if(plabMsgs) plabMsgs.scrollTop=plabMsgs.scrollHeight;

  // Apply prompt from Prompt Lab
  document.querySelectorAll('[data-plab-apply]').forEach(el=>{
    el.addEventListener('click',()=>{
      try {
        const block = atob(el.dataset.plabApply);
        applyPromptBlock(block);
        showBanner('success','Prompt applied to generator.',3000);
        if(tg) tg.HapticFeedback?.notificationOccurred('success');
      } catch(e) {}
    });
  });

  // Music library playback
  document.querySelectorAll('[data-music-play]').forEach(el=>{
    el.addEventListener('click',()=>{
      handleMusicPlay(el.dataset.musicPlay, el.dataset.musicFile);
    });
  });
  // Music scrub bar seeking
  document.querySelectorAll('.music-scrub').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(!S.musicAudioEl||!S.musicAudioEl.duration) return;
      const rect=el.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
      S.musicAudioEl.currentTime=pct*S.musicAudioEl.duration;
      S.musicPlayPct=pct;
      const fill=el.querySelector('.music-scrub-fill');
      const thumb=el.querySelector('.music-scrub-thumb');
      if(fill) fill.style.width=pct*100+'%';
      if(thumb) thumb.style.left=pct*100+'%';
    });
  });
}

// ── Action handlers ───────────────────────────────────────
async function handleCreate() {
  const prompt=S.createPrompt.trim();
  if(!prompt) { showBanner('error','Please describe your video idea.',3000); return; }

  S.chatBusy=true; render();

  // Set style and workflow first
  if(S.selectedStyle) await postJSON('/api/style',{style:S.selectedStyle}).catch(()=>{});
  await postJSON('/api/workflow',{mode:S.selectedWorkflow}).catch(()=>{});

  // Send the prompt
  const res = await postJSON('/api/chat',{
    message: prompt,
    video_length_secs: S.selectedLength,
  }).catch(e=>({error:e.message}));

  S.chatBusy=false;

  if(res.error) {
    showBanner('error', res.error, 5000);
    render();
    return;
  }

  // Refresh session and projects
  S.session = await fetchJSON('/api/session').catch(()=>S.session);
  if(S.session) S.session.prompt = prompt;
  S.projects = await fetchJSON('/api/projects').catch(()=>S.projects);
  S.tab='chat';
  if(tg) tg.HapticFeedback?.notificationOccurred('success');
  render();
}

async function handleChatSend() {
  const input=document.getElementById('chat-input');
  if(!input) return;
  const msg=input.value.trim();
  if(!msg||S.chatBusy) return;

  // Optimistically add user message
  if(!S.session) S.session={active:true,history:[],scenes:[],characters:[],project_id:'',style:'',workflow:'fast-start',video_length_secs:60};
  S.session.history.push({role:'user',content:msg});
  S.chatBusy=true;
  render();

  const res = await postJSON('/api/chat',{message:msg}).catch(e=>({error:e.message}));
  S.chatBusy=false;

  if(res.error) {
    // Remove optimistic message
    S.session.history.pop();
    showBanner('error', res.error, 5000);
  } else {
    // Add assistant response
    S.session.history.push({role:'assistant',content:res.response});
    if(res.scenes?.length) {
      S.session.scenes = res.scenes;
      // Refresh projects list since new scenes were saved
      S.projects = await fetchJSON('/api/projects').catch(()=>S.projects);
    }
    // Keep prompt in sync for project bar
    if(!S.session.prompt && S.session.history.length) {
      const first = S.session.history.find(m=>m.role==='user');
      if(first) S.session.prompt = first.content;
    }
    // Handle generate command intercepted by backend
    if(res.generate_requested) {
      const genRes = await postJSON('/api/generate',{}).catch(e=>({error:e.message}));
      if(genRes.error) showBanner('error',genRes.error,5000);
      else showBanner('success','🎬 Generation started! Monitor in the main app.',5000);
      if(tg) tg.HapticFeedback?.notificationOccurred('success');
    }
  }
  render();
}

async function handleAddCharacter() {
  const nameEl=document.getElementById('char-name');
  const descEl=document.getElementById('char-desc');
  if(!nameEl) return;
  const name=nameEl.value.trim();
  if(!name) { showBanner('error','Character name is required.',3000); return; }

  const res = await postJSON('/api/character',{
    name,
    description: descEl?.value.trim()||'',
    role: window._selectedRole?.()||'',
  }).catch(e=>({error:e.message}));

  if(res.error) { showBanner('error',res.error,4000); return; }

  // Refresh session
  S.session = await fetchJSON('/api/session').catch(()=>S.session);
  showBanner('success','Character "'+name+'" added.',3000);
  if(tg) tg.HapticFeedback?.notificationOccurred('success');
  render();
}

async function handleGenerate() {
  const res = await postJSON('/api/generate',{}).catch(e=>({error:e.message}));
  if(res.error) { showBanner('error',res.error,5000); return; }
  showBanner('success', res.message, 5000);
  if(tg) tg.HapticFeedback?.notificationOccurred('success');
}

async function handleChatGenerate() {
  // Send "generate" as a chat message — the backend intercepts it
  if(!S.session) S.session={active:true,history:[],scenes:[],characters:[],project_id:'',style:'',workflow:'fast-start',video_length_secs:60};
  S.session.history.push({role:'user',content:'generate'});
  S.chatBusy=true;
  render();

  const res = await postJSON('/api/chat',{message:'generate'}).catch(e=>({error:e.message}));
  S.chatBusy=false;

  if(res.error) {
    S.session.history.pop();
    showBanner('error', res.error, 5000);
  } else {
    S.session.history.push({role:'assistant',content:res.response});
    if(res.scenes?.length) S.session.scenes = res.scenes;
    if(res.generate_requested) {
      // Also call the actual generate endpoint
      const genRes = await postJSON('/api/generate',{}).catch(e=>({error:e.message}));
      if(genRes.error) showBanner('error',genRes.error,5000);
      else showBanner('success','🎬 Generation started! Monitor in the main app.',5000);
      if(tg) tg.HapticFeedback?.notificationOccurred('success');
    }
  }
  render();
}

async function handleNewProject() {
  await postJSON('/api/reset',{}).catch(()=>{});
  S.session = await fetchJSON('/api/session').catch(()=>null);
  S.projects = await fetchJSON('/api/projects').catch(()=>S.projects);
  S.createPrompt = '';
  S.selectedStyle = '';
  S.selectedWorkflow = 'fast-start';
  S.selectedLength = 60;
  S.tab = 'create';
  showBanner('info','Starting fresh — ready for a new project.',3000);
  if(tg) tg.HapticFeedback?.notificationOccurred('success');
  render();
}

// ── Monitor inject handler ────────────────────────────────
function handleMonitorInject() {
  const input = document.getElementById('mon-inject-input');
  if(!input) return;
  const msg = input.value.trim();
  if(!msg) return;
  // Send via WebSocket or REST
  if(_ws && _ws.readyState === 1) {
    _ws.send(JSON.stringify({type:'inject', message:msg}));
  } else {
    postJSON('/api/inject', {message:msg}).catch(()=>{});
  }
  S.monitorLogs.push({type:'log', text:'💬 Injected: '+msg, logType:'info', time:Date.now()});
  input.value = '';
  render();
  if(tg) tg.HapticFeedback?.impactOccurred('light');
}

// ── LLM start handler ─────────────────────────────────────
async function handleStartLlm() {
  if(S.llmStarting) return;
  S.llmStarting=true;
  render();
  showBanner('info','Starting local AI — this may take 30–60 seconds...',0);

  const res = await postJSON('/api/llm/start',{}).catch(e=>({ok:false,error:e.message}));
  S.llmStarting=false;

  if(res.ok) {
    S.llmStatus = await fetchJSON('/api/llm/status').catch(()=>S.llmStatus);
    // Also refresh music status so prompt lab unlocks
    S.musicStatus = await fetchJSON('/api/music/status').catch(()=>S.musicStatus);
    S.banner=null;
    showBanner('success', res.already_running ? 'AI already running.' : '🤖 Local AI started!', 3000);
    if(tg) tg.HapticFeedback?.notificationOccurred('success');
  } else {
    S.banner=null;
    showBanner('error', res.error||'Failed to start AI.', 5000);
  }
  render();
}

// ── Video action handlers ─────────────────────────────────
async function handleVideoGenerate() {
  const prompt=S.videoPrompt.trim();
  if(!prompt) { showBanner('error','Describe what should happen in the video.',3000); return; }
  if(S.videoGenerating) return;

  const [w,h] = S.videoDims.split('x').map(Number);

  S.videoGenerating=true;
  S.videoProgress={message:'Submitting to LTX...',percent:5};
  render();

  // Simulate progress while waiting (LTX can take several minutes)
  const pollId = setInterval(()=>{
    if(!S.videoGenerating) { clearInterval(pollId); return; }
    const pct = Math.min(88, (S.videoProgress?.percent||5)+1.5);
    const elapsed = Math.round(pct*2);
    S.videoProgress={message:`Generating frames (${elapsed}s elapsed)...`,percent:pct};
    render();
  }, 6000);

  const body = {
    prompt,
    negative_prompt: S.videoNegPrompt.trim()||null,
    width: w, height: h,
    num_frames: S.videoFrames,
    num_steps: 30,
    guidance_scale: 3.5,
    fps: 24,
    seed: -1,
    image_path: S.videoSelectedImage||null,
  };

  const res = await postJSON('/api/video/generate', body).catch(e=>({error:e.message}));

  clearInterval(pollId);
  S.videoGenerating=false;
  S.videoProgress=null;

  if(res.error) {
    showBanner('error', res.error, 6000);
  } else {
    S.videoLibrary = await fetchJSON('/api/video/library').catch(()=>S.videoLibrary);
    S.videoSubTab='library';
    showBanner('success','🎬 Video generated!',4000);
    if(tg) tg.HapticFeedback?.notificationOccurred('success');
  }
  render();
}

// ── Music action handlers ─────────────────────────────────
async function handleMusicGenerate() {
  const prompt=S.musicPrompt.trim();
  if(!prompt) { showBanner('error','Describe the music you want.',3000); return; }
  if(S.musicGenerating) return;

  S.musicGenerating=true;
  S.musicProgress={message:'Submitting to ACE-Step...',percent:5};
  render();

  // Poll progress periodically
  const pollId = setInterval(()=>{
    if(!S.musicGenerating) { clearInterval(pollId); return; }
    const pct = Math.min(90, (S.musicProgress?.percent||5)+2);
    const elapsed = Math.round(pct*1.5);
    S.musicProgress={message:`Generating (${elapsed}s elapsed)...`,percent:pct};
    render();
  }, 5000);

  const res = await postJSON('/api/music/generate',{
    prompt,
    duration_secs: S.musicDuration,
    tags: S.musicTags.trim()||prompt,
    lyrics: S.musicInstrumental?'[inst]':S.musicLyrics.trim(),
    instrumental: S.musicInstrumental,
  }).catch(e=>({error:e.message}));

  clearInterval(pollId);
  S.musicGenerating=false;
  S.musicProgress=null;

  if(res.error) {
    showBanner('error',res.error,5000);
  } else {
    S.musicLibrary = await fetchJSON('/api/music/library').catch(()=>S.musicLibrary);
    showBanner('success','Music generated successfully.',4000);
    if(tg) tg.HapticFeedback?.notificationOccurred('success');
  }
  render();
}

async function handlePlabSend() {
  const input=document.getElementById('plab-input');
  if(!input) return;
  const msg=input.value.trim();
  if(!msg||S.musicPlabBusy) return;

  S.musicPlabHistory.push({role:'user',content:msg});
  S.musicPlabBusy=true;
  render();

  const res = await postJSON('/api/music/promptlab',{
    message:msg,
    history:S.musicPlabHistory.slice(0,-1), // exclude the message we just added
  }).catch(e=>({error:e.message}));

  S.musicPlabBusy=false;
  if(res.error) {
    S.musicPlabHistory.pop();
    showBanner('error',res.error,5000);
  } else {
    S.musicPlabHistory.push({role:'assistant',content:res.response});
  }
  render();
}

function applyPromptBlock(block) {
  const getField = (key) => {
    const m = block.match(new RegExp('^'+key+':\\s*(.+)','mi'));
    return m ? m[1].trim() : '';
  };
  const caption = getField('CAPTION');
  const tags = getField('TAGS');
  const bpm = getField('BPM');
  const instrumental = getField('INSTRUMENTAL').toLowerCase()==='true';
  const duration = getField('DURATION');
  const lyricsMatch = block.match(/LYRICS:\n([\s\S]*?)(?=\n(?:BPM|KEY|TIME_SIGNATURE|INSTRUMENTAL|DURATION):|\s*$)/i);
  const lyrics = lyricsMatch ? lyricsMatch[1].trim() : '';

  if(caption) S.musicPrompt=caption;
  if(tags) S.musicTags=tags;
  S.musicInstrumental=instrumental;
  if(lyrics && !instrumental) S.musicLyrics=lyrics;
  if(duration && duration!=='auto') S.musicDuration=Math.min(300,Math.max(10,parseInt(duration)||60));
  S.musicSubTab='generate';
  render();
}

function handleMusicPlay(id, filePath) {
  if(S.musicPlayingId===id) {
    // Stop
    if(S.musicRafId) { cancelAnimationFrame(S.musicRafId); S.musicRafId=null; }
    if(S.musicAudioEl) { S.musicAudioEl.pause(); S.musicAudioEl=null; }
    S.musicPlayingId=null;
    S.musicPlayPct=0;
    render();
    return;
  }
  // Stop any current playback
  if(S.musicRafId) { cancelAnimationFrame(S.musicRafId); S.musicRafId=null; }
  if(S.musicAudioEl) { S.musicAudioEl.pause(); S.musicAudioEl=null; }
  const audio = new Audio(mediaUrl(filePath));
  audio.volume=0.7;
  audio.onended=()=>{ if(S.musicRafId) cancelAnimationFrame(S.musicRafId); S.musicPlayingId=null; S.musicAudioEl=null; S.musicPlayPct=0; S.musicRafId=null; render(); };
  audio.onerror=()=>{ if(S.musicRafId) cancelAnimationFrame(S.musicRafId); S.musicPlayingId=null; S.musicAudioEl=null; S.musicPlayPct=0; S.musicRafId=null; showBanner('error','Playback failed',3000); render(); };
  const tick=()=>{
    if(audio.duration) {
      S.musicPlayPct=audio.currentTime/audio.duration;
      // Update scrub bar directly without full re-render
      const fill=document.querySelector('.music-scrub-fill');
      const thumb=document.querySelector('.music-scrub-thumb');
      if(fill) fill.style.width=S.musicPlayPct*100+'%';
      if(thumb) thumb.style.left=S.musicPlayPct*100+'%';
    }
    S.musicRafId=requestAnimationFrame(tick);
  };
  audio.play().then(()=>{ S.musicRafId=requestAnimationFrame(tick); }).catch(()=>{});
  S.musicAudioEl=audio;
  S.musicPlayingId=id;
  S.musicPlayPct=0;
  render();
  if(tg) tg.HapticFeedback?.impactOccurred('light');
}

// ── Telegram back button ──────────────────────────────────
if(tg) {
  tg.BackButton?.onClick(()=>{
    if(S.detail) { S.detail=null; render(); tg.BackButton.hide(); }
    else { tg.close(); }
  });
}
const _origRender=render;
render=function(){
  _origRender();
  if(tg) { if(S.detail) tg.BackButton?.show(); else tg.BackButton?.hide(); }
};

(async function init() {
  S.loading=true; render();
  await loadAll();
  // If there's an active session, default to chat tab
  if(S.session?.active && S.session.history.length) S.tab='chat';
  S.loading=false; render();
})();
