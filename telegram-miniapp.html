<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QwenCoder Agent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0f0f17; --bg2: #181825; --bg3: #1e1e2e;
  --surface: #232336; --bdr: rgba(255,255,255,.08);
  --txt: #e2e8f0; --txt2: #8892a4; --txt3: #5a6478;
  --acc: #4a9eff; --accg: rgba(74,158,255,.12);
  --grn: #48bb78; --grn-bg: rgba(72,187,120,.1);
  --red: #f56565; --red-bg: rgba(245,101,101,.1);
  --org: #ed8936; --org-bg: rgba(237,137,54,.1);
  --pur: #7c5cd0;
  --r: 14px; --rs: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--txt); min-height: 100vh;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* ── Header ─────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg2) 0%, rgba(24,24,37,.96) 100%);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bdr); padding: 16px;
}
.header-row { display:flex; align-items:center; gap:10px; }
.header-logo {
  width:36px; height:36px; border-radius:10px;
  background: linear-gradient(135deg, var(--pur), var(--acc));
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.header-info { flex:1; }
.header-title { font-size:17px; font-weight:700; }
.header-sub { font-size:11px; color:var(--txt2); margin-top:1px; }
.status-pill {
  font-size:10px; padding:4px 10px; border-radius:20px; font-weight:600;
  border:1px solid; white-space:nowrap;
}
.status-pill.idle { background:var(--grn-bg); color:var(--grn); border-color:rgba(72,187,120,.25); }
.status-pill.running { background:var(--org-bg); color:var(--org); border-color:rgba(237,137,54,.25); animation:pulse 2s infinite; }
.status-pill.completed { background:var(--accg); color:var(--acc); border-color:rgba(74,158,255,.25); }
.status-pill.failed { background:var(--red-bg); color:var(--red); border-color:rgba(245,101,101,.25); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── Tabs ────────────────────────────────────── */
.tabs { display:flex; gap:4px; padding:12px 16px 0; }
.tab {
  flex:1; padding:8px 0; text-align:center; font-size:12px; font-weight:600;
  color:var(--txt3); background:transparent; border:none; border-radius:8px;
  cursor:pointer; transition:all .2s;
}
.tab.active { background:var(--bg3); color:var(--txt); }
.tab:active { transform:scale(.97); }

/* ── Content ─────────────────────────────────── */
.content { padding:16px; }
.section { margin-bottom:20px; }
.section-label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; color:var(--txt3); margin-bottom:8px;
}

/* ── Run Tab ─────────────────────────────────── */
.prompt-area {
  width:100%; min-height:100px; padding:12px; border-radius:var(--rs);
  background:var(--surface); border:1px solid var(--bdr); color:var(--txt);
  font-size:14px; font-family:inherit; resize:vertical; outline:none;
  transition:border-color .2s;
}
.prompt-area:focus { border-color:var(--acc); }
.prompt-area::placeholder { color:var(--txt3); }
.char-count { text-align:right; font-size:10px; color:var(--txt3); margin-top:4px; }

.quick-prompts { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.quick-chip {
  padding:6px 12px; border-radius:20px; font-size:11px; font-weight:600;
  background:var(--surface); border:1px solid var(--bdr); color:var(--txt2);
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.quick-chip:active { transform:scale(.95); background:var(--accg); border-color:var(--acc); color:var(--acc); }

.btn {
  width:100%; padding:14px; border:none; border-radius:var(--rs);
  font-size:15px; font-weight:700; cursor:pointer;
  transition:all .2s; margin-top:10px;
}
.btn:active { transform:scale(.98); }
.btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
.btn-primary {
  background:linear-gradient(135deg, var(--pur), var(--acc));
  color:#fff;
}
.btn-danger {
  background:var(--red-bg); color:var(--red);
  border:1px solid rgba(245,101,101,.25);
}
.btn-secondary {
  background:var(--surface); color:var(--txt2);
  border:1px solid var(--bdr);
}

/* ── Job Card ────────────────────────────────── */
.job-card {
  background:var(--surface); border:1px solid var(--bdr);
  border-radius:var(--r); padding:14px; margin-bottom:12px;
}
.job-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.job-id { font-size:12px; font-weight:700; font-family:"SF Mono",monospace; color:var(--acc); }
.job-prompt {
  font-size:13px; color:var(--txt2); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.job-meta { display:flex; gap:12px; margin-top:8px; font-size:11px; color:var(--txt3); }

/* ── Log / Output ────────────────────────────── */
.log-container {
  background:var(--surface); border:1px solid var(--bdr);
  border-radius:var(--rs); max-height:300px; overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.log-entry {
  padding:8px 12px; border-bottom:1px solid var(--bdr);
  font-size:12px; line-height:1.5;
}
.log-entry:last-child { border-bottom:none; }
.log-time { color:var(--txt3); font-size:10px; font-family:"SF Mono",monospace; }
.log-text { color:var(--txt2); margin-top:2px; word-break:break-word; }
.log-text.tool { color:var(--org); }
.log-text.error { color:var(--red); }
.log-text.result { color:var(--grn); }

.empty-state { text-align:center; padding:40px 20px; }
.empty-icon { font-size:40px; margin-bottom:10px; opacity:.5; }
.empty-title { font-size:14px; font-weight:600; color:var(--txt2); margin-bottom:4px; }
.empty-desc { font-size:12px; color:var(--txt3); line-height:1.5; }

/* ── Screenshot ──────────────────────────────── */
.screenshot-container { text-align:center; }
.screenshot-img {
  max-width:100%; border-radius:var(--rs); border:1px solid var(--bdr);
  margin-top:10px; cursor:pointer;
}
.screenshot-placeholder {
  padding:40px; background:var(--surface); border:1px dashed var(--bdr);
  border-radius:var(--rs); color:var(--txt3); margin-top:10px;
}

/* ── Media Gallery ───────────────────────────── */
.media-gallery {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px;
  margin-top:10px;
}
.media-thumb {
  position:relative; border-radius:var(--rs); overflow:hidden;
  border:1px solid var(--bdr); background:var(--bg3);
  cursor:pointer; transition:all .2s; aspect-ratio:16/10;
}
.media-thumb:active { transform:scale(.97); }
.media-thumb img, .media-thumb video {
  width:100%; height:100%; object-fit:cover; display:block;
}
.media-thumb-time {
  position:absolute; bottom:0; left:0; right:0;
  padding:2px 6px; font-size:9px; color:#fff;
  background:linear-gradient(transparent, rgba(0,0,0,.7));
  text-align:right;
}
.media-thumb-play {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.2);
}
.media-thumb-play-icon {
  width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.85);
  display:flex; align-items:center; justify-content:center; font-size:12px;
}

/* ── Lightbox ────────────────────────────────── */
.lightbox {
  position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.92);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.lightbox.open { opacity:1; pointer-events:auto; }
.lightbox img, .lightbox video {
  max-width:95vw; max-height:85vh; border-radius:var(--rs); object-fit:contain;
}
.lightbox-close {
  position:absolute; top:16px; right:16px; width:36px; height:36px;
  border-radius:50%; background:rgba(255,255,255,.15); border:none;
  color:#fff; font-size:18px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
}
.lightbox-nav {
  display:flex; gap:12px; position:absolute; bottom:20px; left:50%;
  transform:translateX(-50%);
}
.lightbox-nav-btn {
  padding:6px 14px; border-radius:16px; border:none;
  background:rgba(255,255,255,.15); color:#fff; font-size:12px;
  font-weight:600; cursor:pointer;
}
.lightbox-nav-btn:active { background:rgba(255,255,255,.25); }

/* ── History Tab ─────────────────────────────── */
.history-list { display:flex; flex-direction:column; gap:8px; }
.history-item {
  background:var(--surface); border:1px solid var(--bdr);
  border-radius:var(--rs); padding:12px; cursor:pointer;
  transition:all .2s;
}
.history-item:active { transform:scale(.98); }
.history-item-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.history-item-prompt {
  font-size:12px; color:var(--txt2); line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

/* ── Projects Tab ────────────────────────────── */
.project-list { display:flex; flex-direction:column; gap:10px; }
.project-card {
  background:var(--surface); border:1px solid var(--bdr);
  border-radius:var(--r); padding:14px; cursor:pointer;
  transition:all .2s;
}
.project-card:active { transform:scale(.98); }
.project-card-name { font-size:14px; font-weight:700; margin-bottom:4px; }
.project-card-dir {
  font-size:11px; color:var(--txt3); font-family:"SF Mono",monospace;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.project-card-meta { display:flex; gap:10px; margin-top:6px; font-size:11px; color:var(--txt2); }

.session-list { display:flex; flex-direction:column; gap:8px; }
.session-card {
  background:var(--surface); border:1px solid var(--bdr);
  border-radius:var(--rs); padding:12px; cursor:pointer;
  transition:all .2s;
}
.session-card:active { transform:scale(.98); }
.session-card-header { display:flex; align-items:center; gap:8px; }
.session-card-name { font-size:13px; font-weight:600; flex:1; }
.session-type-badge {
  font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px;
  text-transform:uppercase; letter-spacing:.5px;
}
.session-type-badge.vibe { background:var(--accg); color:var(--acc); }
.session-type-badge.spec { background:rgba(124,92,208,.12); color:var(--pur); }
.session-card-meta { font-size:11px; color:var(--txt3); margin-top:4px; }

.breadcrumb {
  display:flex; align-items:center; gap:6px; margin-bottom:12px;
  font-size:12px; color:var(--txt2);
}
.breadcrumb-link { color:var(--acc); cursor:pointer; font-weight:600; }
.breadcrumb-link:active { opacity:.7; }
.breadcrumb-sep { color:var(--txt3); }

.message-list { display:flex; flex-direction:column; gap:6px; max-height:400px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.msg-item { padding:8px 12px; border-radius:var(--rs); font-size:12px; line-height:1.5; word-break:break-word; }
.msg-item.user { background:linear-gradient(135deg, rgba(124,92,208,.15), rgba(74,158,255,.15)); border:1px solid rgba(74,158,255,.2); }
.msg-item.assistant { background:var(--surface); border:1px solid var(--bdr); color:var(--txt2); }
.msg-item-role { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--txt3); margin-bottom:2px; }
.msg-item-content { white-space:pre-wrap; }

/* ── Spinner ─────────────────────────────────── */
.spinner {
  width:20px; height:20px; border:2px solid var(--bg3);
  border-top-color:var(--acc); border-radius:50%;
  animation:spin .7s linear infinite; display:inline-block; vertical-align:middle;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Toast ───────────────────────────────────── */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600;
  z-index:200; opacity:0; transition:opacity .3s; pointer-events:none;
  background:var(--bg3); color:var(--txt); border:1px solid var(--bdr);
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show { opacity:1; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
  <div id="lightbox-content"></div>
  <div class="lightbox-nav" id="lightbox-nav"></div>
</div>

<script>
'use strict';

// ── Telegram Web App SDK ──────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
  if (tg.themeParams?.bg_color) {
    document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
  }
}

// ── State ─────────────────────────────────────────────
const state = {
  tab: 'run',        // 'run' | 'monitor' | 'projects' | 'history'
  jobState: 'idle',  // 'idle' | 'running' | 'completed' | 'failed'
  jobId: null,
  jobPrompt: '',
  jobStartedAt: null,
  prompt: '',
  logs: [],
  media: [],         // screenshots & videos captured by the agent
  screenshot: null,
  screenshotLoading: false,
  history: [],
  connected: false,
  pendingQuestion: null,
  pendingOptions: [],
  // Projects & Sessions
  projects: [],
  projectsLoading: false,
  selectedProject: null,   // full project object
  sessions: [],
  sessionsLoading: false,
  selectedSession: null,   // { id, name, type, ... }
  sessionMessages: [],
  messagesLoading: false,
  projectView: 'list',    // 'list' | 'sessions' | 'messages'
  // Lightbox
  lightboxIdx: -1,
};

// ── API Communication ─────────────────────────────────
// Pure REST communication — works perfectly through cloudflared tunnel.
// Uses polling for status updates (same approach as the other app).
let connected = false;
let pollInterval = null;
let disconnectCount = 0;
const DISCONNECT_THRESHOLD = 3; // Show reconnect prompt after 3 consecutive failures

function getApiBase() {
  return window.location.origin;
}

async function sendCmd(type, payload = {}) {
  try {
    const res = await fetch(getApiBase() + '/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, ...payload }),
    });
    const data = await res.json();
    if (!connected) { connected = true; state.connected = true; }
    disconnectCount = 0;
    // For 'run' command, immediately set state to running
    if (type === 'run' && payload.prompt) {
      state.jobState = 'running';
      state.jobPrompt = payload.prompt;
      state.jobStartedAt = Date.now();
      state.jobId = data.jobId || 'job_' + Date.now();
      state.logs = [];
      state.tab = 'monitor';
      showToast('Job started');
    }
    handleMessage(data);
    render();
  } catch {
    disconnectCount++;
    if (connected) { connected = false; state.connected = false; render(); }
    if (disconnectCount >= DISCONNECT_THRESHOLD) { showDisconnectedOverlay(); }
  }
}

async function pollStatus() {
  try {
    const res = await fetch(getApiBase() + '/api/status');
    const data = await res.json();
    if (!connected) { connected = true; state.connected = true; }
    disconnectCount = 0;

    const prev = state.jobState;

    // Update state from server
    if (data.state) {
      state.jobState = data.state;
      state.jobId = data.jobId || state.jobId;
    }

    // Update logs from server — merge new entries instead of replacing
    if (data.logs && data.logs.length > 0) {
      // Use log count as a simple cursor — if server has more logs, take the new ones
      if (data.logs.length > state.logs.length) {
        const newLogs = data.logs.slice(state.logs.length);
        for (const l of newLogs) {
          // Check if this is a media entry (screenshot/image)
          if (l.type === 'media') {
            const src = l.src || l.data;
            if (src) {
              state.media.push({ type: l.mediaType || 'image', src, time: l.time || Date.now() });
              if (state.media.length > 50) state.media.shift();
            }
          } else {
            state.logs.push({ time: l.time || Date.now(), text: l.text, type: l.logType || l.type || 'info' });
          }
        }
      } else if (state.logs.length === 0) {
        // First poll — take all logs, separating media
        for (const l of data.logs) {
          if (l.type === 'media') {
            const src = l.src || l.data;
            if (src) {
              state.media.push({ type: l.mediaType || 'image', src, time: l.time || Date.now() });
            }
          } else {
            state.logs.push({ time: l.time || Date.now(), text: l.text, type: l.logType || l.type || 'info' });
          }
        }
      }
    }

    // Auto-switch to monitor tab when a job starts (from any source)
    if (data.state === 'running' && prev === 'idle') {
      state.jobStartedAt = state.jobStartedAt || Date.now();
      state.tab = 'monitor';
      // Speed up polling while running
      if (pollInterval) { clearInterval(pollInterval); pollInterval = setInterval(pollStatus, 1500); }
    }

    // Notifications on state transitions
    if (data.state === 'completed' && prev === 'running') {
      state.history.unshift({ id: state.jobId, prompt: state.jobPrompt, state: 'completed', time: Date.now() });
      showToast('Job completed ✓');
      // Slow polling back down
      if (pollInterval) { clearInterval(pollInterval); pollInterval = setInterval(pollStatus, 3000); }
    } else if (data.state === 'failed' && prev === 'running') {
      state.history.unshift({ id: state.jobId, prompt: state.jobPrompt, state: 'failed', time: Date.now() });
      showToast('Job failed');
      if (pollInterval) { clearInterval(pollInterval); pollInterval = setInterval(pollStatus, 3000); }
    }

    render();
  } catch {
    disconnectCount++;
    if (connected) { connected = false; state.connected = false; render(); }
    if (disconnectCount >= DISCONNECT_THRESHOLD) { showDisconnectedOverlay(); }
  }
}

function startPolling() {
  pollStatus();
  pollInterval = setInterval(pollStatus, 3000);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'status':
      state.jobState = msg.state || 'idle';
      state.jobId = msg.jobId || null;
      state.jobPrompt = msg.prompt || '';
      state.jobStartedAt = msg.startedAt || null;
      break;
    case 'job_started':
      state.jobState = 'running';
      state.jobId = msg.jobId;
      state.jobPrompt = msg.prompt || state.prompt;
      state.jobStartedAt = Date.now();
      state.logs = [];
      state.tab = 'monitor';
      showToast('Job started');
      break;
    case 'job_completed':
      state.jobState = 'completed';
      state.pendingQuestion = null;
      state.pendingOptions = [];
      state.history.unshift({ id: state.jobId, prompt: state.jobPrompt, state: 'completed', time: Date.now() });
      showToast('Job completed ✓');
      break;
    case 'job_failed':
      state.jobState = 'failed';
      state.pendingQuestion = null;
      state.pendingOptions = [];
      state.logs.push({ time: Date.now(), text: msg.error || 'Job failed', type: 'error' });
      state.history.unshift({ id: state.jobId, prompt: state.jobPrompt, state: 'failed', time: Date.now() });
      showToast('Job failed');
      break;
    case 'log':
      state.logs.push({ time: Date.now(), text: msg.text, type: msg.logType || 'info' });
      break;
    case 'tool_use':
      state.logs.push({ time: Date.now(), text: `🔧 ${msg.tool}: ${msg.summary || ''}`, type: 'tool' });
      break;
    case 'input_request':
      state.pendingQuestion = msg.question || '';
      state.pendingOptions = msg.options || [];
      state.logs.push({ time: Date.now(), text: `❓ Agent asks: ${msg.question}`, type: 'info' });
      state.tab = 'monitor';
      break;
    case 'screenshot':
      state.screenshot = msg.data; // base64 or URL
      state.screenshotLoading = false;
      // Also add to media gallery
      if (msg.data) {
        const src = msg.data.startsWith('data:') ? msg.data : 'data:image/png;base64,' + msg.data;
        state.media.push({ type: 'image', src, time: Date.now() });
        if (state.media.length > 50) state.media.shift();
      }
      break;
    case 'media':
      if (msg.src || msg.data) {
        const src = msg.src || msg.data;
        state.media.push({ type: msg.mediaType || 'image', src, time: msg.time || Date.now() });
        if (state.media.length > 50) state.media.shift();
      }
      break;
    case 'input_request':
      state.logs.push({ time: Date.now(), text: `❓ Agent asks: ${msg.question}`, type: 'info' });
      break;
    case 'history':
      state.history = msg.items || [];
      break;
  }
  render();
}

// ── Actions ───────────────────────────────────────────
function runJob() {
  const prompt = state.prompt.trim();
  if (!prompt) return;
  sendCmd('run', { prompt });
  state.prompt = '';
  render();
}

function stopJob() {
  sendCmd('stop');
  state.jobState = 'idle';
  showToast('Job stopped');
  render();
}

function requestScreenshot() {
  state.screenshotLoading = true;
  sendCmd('screenshot');
  render();
}

function requestStatus() {
  sendCmd('status');
}

async function injectPrompt(message) {
  if (!message) return;
  try {
    await fetch(getApiBase() + '/api/inject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    showToast('Message sent to agent');
  } catch { showToast('Failed to send'); }
}

async function replyToAgent(text) {
  if (text == null) return;
  try {
    await fetch(getApiBase() + '/api/reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    state.pendingQuestion = null;
    state.pendingOptions = [];
    showToast('Reply sent');
    render();
  } catch { showToast('Failed to send reply'); }
}

// ── REST API Helpers ──────────────────────────────────
const API_BASE = window.location.origin;

async function fetchProjects() {
  state.projectsLoading = true;
  render();
  try {
    const res = await fetch(API_BASE + '/api/projects');
    state.projects = await res.json();
  } catch { state.projects = []; }
  state.projectsLoading = false;
  render();
}

async function fetchSessions(projectId) {
  state.sessionsLoading = true;
  render();
  try {
    const res = await fetch(API_BASE + '/api/projects/' + projectId + '/sessions');
    state.sessions = await res.json();
  } catch { state.sessions = []; }
  state.sessionsLoading = false;
  render();
}

async function fetchMessages(projectId, sessionId) {
  state.messagesLoading = true;
  render();
  try {
    const res = await fetch(API_BASE + '/api/projects/' + projectId + '/sessions/' + sessionId + '/messages');
    state.sessionMessages = await res.json();
  } catch { state.sessionMessages = []; }
  state.messagesLoading = false;
  render();
}

async function runOnSession(projectId, sessionId, prompt) {
  try {
    await fetch(API_BASE + '/api/projects/' + projectId + '/sessions/' + sessionId + '/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    showToast('Job started on session');
    state.tab = 'monitor';
    render();
  } catch { showToast('Failed to start job'); }
}

// ── Quick Prompts ─────────────────────────────────────
const QUICK_PROMPTS = [
  'Fix all lint errors',
  'Add error handling',
  'Write unit tests',
  'Refactor for readability',
  'Add TypeScript types',
  'Optimize performance',
];

// ── Rendering ─────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderTabs() + renderContent();
  bindEvents();
}

function renderHeader() {
  const stateLabel = state.jobState.charAt(0).toUpperCase() + state.jobState.slice(1);
  return `
    <div class="header">
      <div class="header-row">
        <div class="header-logo">⚡</div>
        <div class="header-info">
          <div class="header-title">QwenCoder Agent</div>
          <div class="header-sub">${state.connected ? 'Connected' : 'Connecting...'}</div>
        </div>
        <span class="status-pill ${state.jobState}">${stateLabel}</span>
      </div>
    </div>`;
}

function renderTabs() {
  const tabs = [
    { id: 'run', label: '▶ Run' },
    { id: 'monitor', label: '📊 Monitor' },
    { id: 'projects', label: '📁 Projects' },
    { id: 'history', label: '📋 History' },
  ];
  return `<div class="tabs">${tabs.map(t =>
    `<button class="tab ${state.tab === t.id ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`
  ).join('')}</div>`;
}

function renderContent() {
  switch (state.tab) {
    case 'run': return renderRunTab();
    case 'monitor': return renderMonitorTab();
    case 'projects': return renderProjectsTab();
    case 'history': return renderHistoryTab();
    default: return '';
  }
}

function renderRunTab() {
  const isRunning = state.jobState === 'running';
  return `
    <div class="content">
      <div class="section">
        <div class="section-label">Quick Actions</div>
        <div class="quick-prompts">
          ${QUICK_PROMPTS.map(p => `<button class="quick-chip" data-prompt="${esc(p)}">${esc(p)}</button>`).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Prompt</div>
        <textarea class="prompt-area" id="prompt-input" placeholder="Describe what you want the agent to do..."
          ${isRunning ? 'disabled' : ''}>${esc(state.prompt)}</textarea>
        <div class="char-count">${state.prompt.length} chars</div>
      </div>
      <button class="btn btn-primary" id="btn-run" ${isRunning || !state.prompt.trim() ? 'disabled' : ''}>
        ${isRunning ? '<span class="spinner"></span> Running...' : '🚀 Run Agent'}
      </button>
      ${isRunning ? `<button class="btn btn-danger" id="btn-stop">⏹ Stop Job</button>` : ''}
    </div>`;
}

function renderMonitorTab() {
  if (state.jobState === 'idle' && state.logs.length === 0 && !state.jobPrompt) {
    return `
      <div class="content">
        <div class="empty-state">
          <div class="empty-icon">📡</div>
          <div class="empty-title">No active job</div>
          <div class="empty-desc">Start a job from the Run tab to see live progress here.</div>
        </div>
      </div>`;
  }

  const jobCard = state.jobId ? `
    <div class="job-card">
      <div class="job-card-header">
        <span class="job-id">${esc(state.jobId)}</span>
        <span class="status-pill ${state.jobState}">${state.jobState}</span>
      </div>
      <div class="job-prompt">${esc(state.jobPrompt)}</div>
      <div class="job-meta">
        ${state.jobStartedAt ? `<span>⏱ ${elapsed(state.jobStartedAt)}</span>` : ''}
        <span>📝 ${state.logs.length} events</span>
      </div>
    </div>` : '';

  const logsHtml = state.logs.length > 0 ? `
    <div class="section">
      <div class="section-label">Activity Log</div>
      <div class="log-container" id="log-container">
        ${state.logs.slice(-50).map(l => `
          <div class="log-entry">
            <div class="log-time">${formatTime(l.time)}</div>
            <div class="log-text ${l.type || ''}">${esc(l.text)}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const screenshotSection = `
    <div class="section">
      <div class="section-label">📸 Screenshots & Media${state.media.length ? ' (' + state.media.length + ')' : ''}</div>
      <div class="screenshot-container">
        <button class="btn btn-secondary" id="btn-screenshot" ${state.screenshotLoading ? 'disabled' : ''}>
          ${state.screenshotLoading ? '<span class="spinner"></span>' : '📸'} Capture Screenshot
        </button>
        ${state.media.length > 0 ? `
          <div class="media-gallery">
            ${[...state.media].reverse().map((m, i) => {
              const idx = state.media.length - 1 - i;
              const timeStr = m.time ? formatTime(m.time) : '';
              if (m.type === 'video') {
                return `<div class="media-thumb" data-media-idx="${idx}">
                  <video src="${esc(m.src)}" muted playsinline preload="metadata"></video>
                  <div class="media-thumb-play"><div class="media-thumb-play-icon">▶</div></div>
                  <div class="media-thumb-time">${esc(timeStr)}</div>
                </div>`;
              }
              return `<div class="media-thumb" data-media-idx="${idx}">
                <img src="${esc(m.src)}" alt="Screenshot" loading="lazy">
                <div class="media-thumb-time">${esc(timeStr)}</div>
              </div>`;
            }).join('')}
          </div>` : (state.screenshot
            ? `<img class="screenshot-img" src="${state.screenshot}" alt="Screenshot" data-media-idx="${state.media.length - 1}">`
            : `<div class="screenshot-placeholder">No screenshots yet — capture one or wait for the agent to take one</div>`)}
      </div>
    </div>`;

  // Ask-user reply UI — shown when agent is waiting for input
  const askUserSection = state.pendingQuestion ? `
    <div class="section" style="background:var(--org-bg);border:1px solid rgba(237,137,54,.3);border-radius:var(--r);padding:14px;margin-bottom:12px;">
      <div class="section-label" style="color:var(--org);">❓ Agent needs your input</div>
      <div style="font-size:13px;color:var(--txt);margin-bottom:8px;line-height:1.5;">${esc(state.pendingQuestion)}</div>
      ${state.pendingOptions && state.pendingOptions.length > 0 ? `
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
          ${state.pendingOptions.map(o => `<button class="quick-chip ask-option" data-option="${esc(o)}">${esc(o)}</button>`).join('')}
        </div>` : ''}
      <div style="display:flex;gap:8px;">
        <input type="text" id="ask-reply-input" placeholder="Type your reply..." style="flex:1;padding:10px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--bdr);color:var(--txt);font-size:13px;outline:none;">
        <button class="btn btn-primary" id="btn-ask-reply" style="width:auto;padding:10px 16px;margin-top:0;">Send</button>
      </div>
    </div>` : '';

  // Inject prompt — always visible when job is running
  const injectSection = state.jobState === 'running' ? `
    <div class="section">
      <div class="section-label">💬 Send message to agent</div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="inject-input" placeholder="Nudge the agent, give instructions, or answer a question..." style="flex:1;padding:10px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--bdr);color:var(--txt);font-size:13px;outline:none;">
        <button class="btn btn-secondary" id="btn-inject" style="width:auto;padding:10px 16px;margin-top:0;border:1px solid var(--acc);color:var(--acc);">Send</button>
      </div>
    </div>` : '';

  const actions = state.jobState === 'running' ? `
    <button class="btn btn-danger" id="btn-stop">⏹ Stop Job</button>` : '';

  return `<div class="content">${jobCard}${askUserSection}${logsHtml}${injectSection}${screenshotSection}${actions}</div>`;
}

function renderProjectsTab() {
  if (state.projectView === 'messages' && state.selectedSession) {
    return renderSessionMessages();
  }
  if (state.projectView === 'sessions' && state.selectedProject) {
    return renderProjectSessions();
  }
  return renderProjectList();
}

function renderProjectList() {
  if (state.projectsLoading) {
    return `<div class="content"><div class="empty-state"><div class="spinner"></div><div class="loading-text">Loading projects...</div></div></div>`;
  }
  if (state.projects.length === 0) {
    return `
      <div class="content">
        <div class="empty-state">
          <div class="empty-icon">📁</div>
          <div class="empty-title">No projects</div>
          <div class="empty-desc">Create a project in the main app to see it here.</div>
        </div>
      </div>`;
  }
  return `
    <div class="content">
      <div class="section-label">Your Projects</div>
      <div class="project-list">
        ${state.projects.map(p => `
          <div class="project-card" data-project-id="${esc(p.id)}">
            <div class="project-card-name">${esc(p.name)}</div>
            <div class="project-card-dir">${esc(p.directory || '')}</div>
            <div class="project-card-meta">
              <span>📅 ${relTime(p.lastOpened || p.created)}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderProjectSessions() {
  const p = state.selectedProject;
  const breadcrumb = `
    <div class="breadcrumb">
      <span class="breadcrumb-link" id="back-to-projects">Projects</span>
      <span class="breadcrumb-sep">›</span>
      <span>${esc(p.name)}</span>
    </div>`;

  if (state.sessionsLoading) {
    return `<div class="content">${breadcrumb}<div class="empty-state"><div class="spinner"></div></div></div>`;
  }
  if (state.sessions.length === 0) {
    return `
      <div class="content">
        ${breadcrumb}
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-title">No sessions</div>
          <div class="empty-desc">Start a session in the main app.</div>
        </div>
      </div>`;
  }
  return `
    <div class="content">
      ${breadcrumb}
      <div class="section-label">Sessions</div>
      <div class="session-list">
        ${state.sessions.map(s => `
          <div class="session-card" data-session-id="${esc(s.id)}">
            <div class="session-card-header">
              <span class="session-card-name">${esc(s.name)}</span>
              <span class="session-type-badge ${s.type || 'vibe'}">${s.type || 'vibe'}</span>
            </div>
            <div class="session-card-meta">
              ${s.messageCount || 0} messages · ${relTime(s.lastUsed || s.created)}
            </div>

function renderSessionMessages() {
  const p = state.selectedProject;
  const s = state.selectedSession;
  const breadcrumb = `
    <div class="breadcrumb">
      <span class="breadcrumb-link" id="back-to-projects">Projects</span>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-link" id="back-to-sessions">${esc(p.name)}</span>
      <span class="breadcrumb-sep">›</span>
      <span>${esc(s.name)}</span>
    </div>`;

  if (state.messagesLoading) {
    return `<div class="content">${breadcrumb}<div class="empty-state"><div class="spinner"></div></div></div>`;
  }

  const msgs = state.sessionMessages;
  const messagesHtml = msgs.length === 0
    ? `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Empty session</div><div class="empty-desc">No messages yet. Run a prompt below.</div></div>`
    : `<div class="message-list">${msgs.map(m => `
        <div class="msg-item ${m.role || 'user'}">
          <div class="msg-item-role">${esc(m.role || 'user')}</div>
          <div class="msg-item-content">${esc(truncate(m.content || '', 500))}</div>
        </div>`).join('')}</div>`;

  const runSection = `
    <div class="section" style="margin-top:16px;">
      <div class="section-label">Run on this session</div>
      <textarea class="prompt-area" id="session-prompt" placeholder="Enter a prompt to run on this session..." style="min-height:60px;"></textarea>
      <button class="btn btn-primary" id="btn-session-run" style="margin-top:8px;">🚀 Run</button>
    </div>`;

  return `<div class="content">${breadcrumb}${messagesHtml}${runSection}</div>`;
}

function renderHistoryTab() {
  if (state.history.length === 0) {
    return `
      <div class="content">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">No history yet</div>
          <div class="empty-desc">Completed and failed jobs will appear here.</div>
        </div>
      </div>`;
  }

  return `
    <div class="content">
      <div class="history-list">
        ${state.history.map(h => `
          <div class="history-item">
            <div class="history-item-header">
              <span class="job-id">${esc(h.id)}</span>
              <span class="status-pill ${h.state}">${h.state}</span>
            </div>
            <div class="history-item-prompt">${esc(h.prompt)}</div>
            <div class="job-meta"><span>${relTime(h.time)}</span></div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── Event Binding ─────────────────────────────────────
function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab').forEach(el => {
    el.onclick = () => {
      state.tab = el.dataset.tab;
      if (el.dataset.tab === 'projects' && state.projects.length === 0) fetchProjects();
      render();
    };
  });
  // Prompt input
  const input = document.getElementById('prompt-input');
  if (input) {
    input.oninput = () => { state.prompt = input.value; document.querySelector('.char-count').textContent = state.prompt.length + ' chars'; toggleRunBtn(); };
    input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runJob(); } };
  }
  // Quick prompts
  document.querySelectorAll('.quick-chip').forEach(el => {
    el.onclick = () => { state.prompt = el.dataset.prompt; render(); };
  });
  // Buttons
  const btnRun = document.getElementById('btn-run');
  if (btnRun) btnRun.onclick = runJob;
  const btnStop = document.getElementById('btn-stop');
  if (btnStop) btnStop.onclick = stopJob;
  const btnScreenshot = document.getElementById('btn-screenshot');
  if (btnScreenshot) btnScreenshot.onclick = requestScreenshot;

  // Media gallery — open lightbox on click
  document.querySelectorAll('[data-media-idx]').forEach(el => {
    el.onclick = () => { openLightbox(parseInt(el.dataset.mediaIdx)); };
  });

  // Inject prompt
  const btnInject = document.getElementById('btn-inject');
  const injectInput = document.getElementById('inject-input');
  if (btnInject && injectInput) {
    const doInject = () => {
      const msg = injectInput.value.trim();
      if (msg) { injectPrompt(msg); injectInput.value = ''; }
    };
    btnInject.onclick = doInject;
    injectInput.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); doInject(); } };
  }

  // Ask-user reply
  const btnAskReply = document.getElementById('btn-ask-reply');
  const askReplyInput = document.getElementById('ask-reply-input');
  if (btnAskReply && askReplyInput) {
    const doReply = () => {
      const text = askReplyInput.value.trim();
      if (text) { replyToAgent(text); askReplyInput.value = ''; }
    };
    btnAskReply.onclick = doReply;
    askReplyInput.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); doReply(); } };
  }
  // Ask-user option buttons
  document.querySelectorAll('.ask-option').forEach(el => {
    el.onclick = () => { replyToAgent(el.dataset.option); };
  });

  // Auto-scroll log
  const logContainer = document.getElementById('log-container');
  if (logContainer) logContainer.scrollTop = logContainer.scrollHeight;

  // ── Project navigation ──
  document.querySelectorAll('.project-card').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.projectId;
      const proj = state.projects.find(p => p.id === id);
      if (proj) {
        state.selectedProject = proj;
        state.projectView = 'sessions';
        fetchSessions(id);
      }
    };
  });

  // Session cards
  document.querySelectorAll('.session-card').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.sessionId;
      const sess = state.sessions.find(s => s.id === id);
      if (sess && state.selectedProject) {
        state.selectedSession = sess;
        state.projectView = 'messages';
        fetchMessages(state.selectedProject.id, id);
      }
    };
  });

  // Breadcrumb navigation
  const backToProjects = document.getElementById('back-to-projects');
  if (backToProjects) {
    backToProjects.onclick = () => { state.projectView = 'list'; state.selectedProject = null; state.selectedSession = null; render(); };
  }
  const backToSessions = document.getElementById('back-to-sessions');
  if (backToSessions) {
    backToSessions.onclick = () => { state.projectView = 'sessions'; state.selectedSession = null; render(); };
  }

  // Session run button
  const btnSessionRun = document.getElementById('btn-session-run');
  const sessionPrompt = document.getElementById('session-prompt');
  if (btnSessionRun && sessionPrompt) {
    btnSessionRun.onclick = () => {
      const prompt = sessionPrompt.value.trim();
      if (prompt && state.selectedProject && state.selectedSession) {
        runOnSession(state.selectedProject.id, state.selectedSession.id, prompt);
      }
    };
  }
}

function toggleRunBtn() {
  const btn = document.getElementById('btn-run');
  if (btn) btn.disabled = state.jobState === 'running' || !state.prompt.trim();
}

// ── Helpers ───────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function truncate(s, max) { return s.length > max ? s.slice(0, max) + '…' : s; }
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function elapsed(start) {
  const s = Math.floor((Date.now() - start) / 1000);
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}
function relTime(ts) {
  const d = (Date.now() - ts) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d / 60) + 'm ago';
  if (d < 86400) return Math.floor(d / 3600) + 'h ago';
  return Math.floor(d / 86400) + 'd ago';
}

// ── Toast ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Lightbox ──────────────────────────────────────────
function openLightbox(idx) {
  if (idx < 0 || idx >= state.media.length) return;
  state.lightboxIdx = idx;
  const m = state.media[idx];
  const lb = document.getElementById('lightbox');
  const ct = document.getElementById('lightbox-content');
  const nav = document.getElementById('lightbox-nav');

  if (m.type === 'video') {
    ct.innerHTML = `<video src="${esc(m.src)}" controls autoplay playsinline style="max-width:95vw;max-height:85vh;border-radius:10px"></video>`;
  } else {
    ct.innerHTML = `<img src="${esc(m.src)}" alt="Screenshot">`;
  }

  // Navigation buttons
  const hasPrev = idx > 0;
  const hasNext = idx < state.media.length - 1;
  nav.innerHTML = `
    ${hasPrev ? '<button class="lightbox-nav-btn" id="lb-prev">← Prev</button>' : ''}
    <span style="color:rgba(255,255,255,.5);font-size:11px;">${idx + 1} / ${state.media.length}</span>
    ${hasNext ? '<button class="lightbox-nav-btn" id="lb-next">Next →</button>' : ''}
  `;

  lb.classList.add('open');

  // Bind nav buttons
  const prevBtn = document.getElementById('lb-prev');
  const nextBtn = document.getElementById('lb-next');
  if (prevBtn) prevBtn.onclick = (e) => { e.stopPropagation(); openLightbox(idx - 1); };
  if (nextBtn) nextBtn.onclick = (e) => { e.stopPropagation(); openLightbox(idx + 1); };

  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-content').innerHTML = '';
  state.lightboxIdx = -1;
}

// ── Disconnected Overlay ──────────────────────────────
function showDisconnectedOverlay() {
  stopPolling();
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px;opacity:.6">🔌</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Connection Lost</div>
      <div style="font-size:13px;color:var(--txt2);line-height:1.6;max-width:280px;margin-bottom:20px">
        The server URL has changed. Please close this window and reopen the Mini App from Telegram to reconnect.
      </div>
      <div style="font-size:11px;color:var(--txt3)">Type <code>/app</code> in the bot chat to get the new link.</div>
    </div>`;
}

// ── Init ──────────────────────────────────────────────
render();
startPolling();
</script>
